{{- define "shared-lib.deployment" }}
{{- $root := . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm.labels" . | nindent 4 }}
  {{- if or .Values.syncWave .Values.keel }}
  annotations:
    {{- if .Values.syncWave }}
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave | default 0 | quote }}
    {{- end }}
    {{- if .Values.keel -}}
    {{- if eq .Values.keel.policy "force" }}
    keel.sh/match-tag: "true"
    {{- end }}
    keel.sh/policy: {{ .Values.keel.policy }}
    keel.sh/pollSchedule: {{ .Values.keel.pollSchedule | default "@hourly" | quote }}
    keel.sh/trigger: poll
    {{- end }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount | default "1" }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "helm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "helm.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with (include "shared-lib.podSecurityContext" .) }}
      {{- . | nindent 6 }}
      {{- end }}
      {{- with (include "shared-lib.hostNetwork" .) }}
      {{- . | nindent 6 }}
      {{- end }}
      {{- with (include "shared-lib.dnsPolicy" .) }}
      {{- . | nindent 6 }}
      {{- end }}
      {{- with (include "shared-lib.affinity" .) }}
      {{- . | nindent 6 }}
      {{- end }}
      {{- if .Values.initContainers }}
      initContainers:
        {{- tpl (toYaml .Values.initContainers) . | nindent 8 }}
      {{- end }}
      containers:
        - {{ include "shared-lib.container" . | indent 10 | trim }}
      {{- if or .Values.storage .Values.extraVolumes }}
      volumes:
        {{- if .Values.storage }}
        {{- range .Values.storage }}
        - name: {{ printf "%s-%s" (include "helm.fullname" $root ) ( default  "" .nameSuffix )| trunc 63 | trimSuffix "-" }}
          persistentVolumeClaim:
            {{- if eq .type "existingClaim" }}
            claimName: {{ .claimName }}
            {{- else }}
            claimName: {{ printf "%s-%s" (include "helm.fullname" $root ) ( default  "" .nameSuffix )| trunc 63 | trimSuffix "-" }}
            {{- end }}
        {{- end }}
        {{- end }}
        {{- if .Values.extraVolumes }}
        {{- toYaml .Values.extraVolumes | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
