{{- define "shared-lib.ingress_internal_secure" -}}
{{- if .Values.ingress_internal_secure.serversTransport }}
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: {{ .Values.ingress_internal_secure.serversTransport }}
  namespace: {{ .Release.Namespace }}
spec:
  insecureSkipVerify: true
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "helm.fullname" . }}-ingress-internal-secure
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm.labels" . | nindent 4 }}
  {{- if .Values.syncWave }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave | default 0 | quote }}
  {{- end }}
spec:
  entryPoints: 
    - websecure
  routes:
  - kind: Rule
    match: Host(`{{ .Values.ingress_internal_secure.host }}`)
           {{- if .Values.ingress_internal_secure.additionalRules }}
           && {{ .Values.ingress_internal_secure.additionalRules }}
           {{- end }}
    {{- if (default dict .Values.scaleToZero).enabled }}
    middlewares:
    - name: {{ include "helm.fullname" . }}-sablier
    {{- end }}
    services:
    - kind: Service
      name: {{ include "helm.fullname" . }}-service
      namespace: {{ .Release.Namespace }}
      port: {{ include "shared-lib.portNumber" (index (include "shared-lib.getPorts" . | fromYaml) .Values.ingress_internal_secure.port) }}
      {{- if .Values.ingress_internal_secure.serversTransport }}
      serversTransport: {{ .Values.ingress_internal_secure.serversTransport }}
      scheme: https
      {{- end }}
  tls: {}
{{- end }}
