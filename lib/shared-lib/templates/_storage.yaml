{{/* ── Main storage orchestrator ── */}}
{{- define "shared-lib.storage" }}
{{- $root := . }}
  {{- range $i, $storage := .Values.storage }}
    {{- if gt $i 0 }}
---
    {{- end }}
    {{- if and (eq $storage.type "nfs-client") (hasKey $storage "storagePath") }}
{{ include "shared-lib.nfs-client-path" (dict "root" $root "storage" $storage) }}
    {{- else if eq $storage.type "nfs-client" }}
{{ include "shared-lib.nfs-client-name" (dict "root" $root "storage" $storage) }}
    {{- else if eq $storage.type "longhorn" }}
{{ include "shared-lib.longhorn" (dict "root" $root "storage" $storage) }}
    {{- else if eq $storage.type "existingClaim" }}
      {{/* No PVC creation needed for existing claims */}}
    {{- else }}
      {{- fail (printf "Unsupported storage type '%s'" $storage.type) }}
    {{- end }}
  {{- end }}
{{- end }}

{{/* ── Helper: PVC name ── */}}
{{- define "shared-lib.storage.pvcName" -}}
{{- printf "%s-%s" (include "helm.fullname" .root) (default "" .storage.nameSuffix) | trunc 63 | trimSuffix "-" -}}
{{- end -}}

{{/* ── Helper: Access modes (smart defaults based on storage class) ── */}}
{{- define "shared-lib.storage.accessModes" -}}
{{- if .storage.accessModes -}}
  {{- $modes := .storage.accessModes -}}
  {{- range $i, $mode := $modes }}
{{- if $i }}
{{ end -}}
- {{ $mode }}
  {{- end -}}
{{- else if eq .storage.storageClass "longhorn-shared" -}}
- ReadWriteMany
{{- else -}}
- ReadWriteOnce
{{- end -}}
{{- end -}}

{{/* ── Convert human-readable size (1Gi, 500Mi) to bytes for Longhorn Volume CR ── */}}
{{- define "shared-lib.storage.sizeToBytes" -}}
  {{- $size := .size | toString -}}
  {{- if hasSuffix "Ti" $size -}}
    {{- $num := trimSuffix "Ti" $size | float64 -}}
    {{- printf "%.0f" (mulf $num 1099511627776.0) -}}
  {{- else if hasSuffix "Gi" $size -}}
    {{- $num := trimSuffix "Gi" $size | float64 -}}
    {{- printf "%.0f" (mulf $num 1073741824.0) -}}
  {{- else if hasSuffix "Mi" $size -}}
    {{- $num := trimSuffix "Mi" $size | float64 -}}
    {{- printf "%.0f" (mulf $num 1048576.0) -}}
  {{- else -}}
    {{- $size -}}
  {{- end -}}
{{- end -}}


