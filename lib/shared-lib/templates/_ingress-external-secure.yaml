{{- define "shared-lib.ingress_external_secure" -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "helm.fullname" . }}-ingress-external-secure
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm.labels" . | nindent 4 }}
  {{- if .Values.syncWave }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave | default 0 | quote }}
  {{- end }}
spec:
  ingressClassName: traefik-external
  entryPoints:
    - websecure
  routes:
  - kind: Rule
    match: Host(`{{ .Values.ingress_external_secure.host }}`)
           {{- if .Values.ingress_external_secure.additionalRules }}
           && {{ .Values.ingress_external_secure.additionalRules }}
           {{- end }}
    {{- if (default dict .Values.scaleToZero).enabled }}
    middlewares:
    - name: {{ include "helm.fullname" . }}-sablier
    {{- end }}
    services:
    - kind: Service
      name: {{ include "helm.fullname" . }}-service
      namespace: {{ .Release.Namespace }}
      port: {{ include "shared-lib.portNumber" (index (include "shared-lib.getPorts" . | fromYaml) .Values.ingress_external_secure.port) }}
  tls: {}
{{- end }}
