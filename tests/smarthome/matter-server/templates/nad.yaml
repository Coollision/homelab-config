# NetworkAttachmentDefinition — MACVLAN bridge on the host's VLAN 40 sub-interface.
#
# This gives the matter-server pod a real Layer-2 interface on VLAN 40 (IoT),
# so mDNS multicast from IoT devices is received directly without any proxy.
#
# Pre-requisites on the host node:
#   1. Switch port tagged for VLAN 40 (see MATTER_INTEGRATION.md §5.1)
#   2. VLAN sub-interface created on the node (see MATTER_INTEGRATION.md §6.1)
#      e.g.  ip link add link enp1s0 name enp1s0.40 type vlan id 40
#            ip link set enp1s0.40 up
#
# The pod will have two interfaces:
#   eth0  — K8s cluster network (Flannel overlay, VLAN 30 routing)
#   net1  — MACVLAN on VLAN 40 sub-interface (direct IoT VLAN access)
#
# matter-server uses PRIMARY_INTERFACE=net1 to bind mDNS to the IoT VLAN.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: matter-server-vlan40
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "matter-server-vlan40",
      "type": "macvlan",
      "master": "{{ .Values.vlan40.parentInterface }}",
      "mode": "bridge",
      "ipam": {
        "type": "static",
        "addresses": [
          {
            "address": "{{ .Values.vlan40.podIp }}/24",
            "gateway": "{{ .Values.vlan40.gateway }}"
          }
        ],
        "routes": [
          { "dst": "0.0.0.0/0" }
        ]
      }
    }
