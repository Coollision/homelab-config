fullnameOverride: matter-server

statefulset:
  image:
    repository: ghcr.io/matter-js/matterjs-server
    tag: stable
  ports:
    ws: 5580

config:
  TZ: Europe/Brussels
  STORAGE_PATH: /data
  # net1 is the Multus-attached MACVLAN interface on VLAN 40 (IoT).
  # Matter uses this primary interface for mDNS multicast so IoT devices are
  # discovered directly on their VLAN without any proxy or forwarder.
  PRIMARY_INTERFACE: net1

# Multus attaches two additional MACVLAN interfaces to this pod:
#   net1 = VLAN 40 (IoT / Matter device discovery)
#   net2 = VLAN 5  (Intern / commissioning clients)
# No hostNetwork needed — the pod gets dedicated IPs on both VLANs.
multusNetworks:
  - name: matter-server-vlan40
    parentInterface: vlan40
    nodeLabelKey: vlan40-trunk
    type: macvlan
    mode: bridge
    ipam:
      type: dhcp
  - name: matter-server-vlan5
    parentInterface: vlan5
    nodeLabelKey: vlan5-trunk
    type: macvlan
    mode: bridge
    ipam:
      type: dhcp

imagePreSync: true

ingress_internal_secure:
  host: matter-server.<secret:kv/data/domains~domain>
  port: ws

storage:
  - mountPath: /data
    type: longhorn
    size: 1Gi
    volumeName: matter-server
    nameSuffix: data
    protect: true

probes:
  liveness:
    httpGet:
      path: /
      port: ws
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    httpGet:
      path: /
      port: ws
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

labels:
  app.kubernetes.io/component: matter-server

