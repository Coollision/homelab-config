# ──────────────────────────────────────────────
# Longhorn upstream chart values
# ──────────────────────────────────────────────
longhorn:
  preUpgradeChecker:
    jobEnabled: false

  defaultSettings:
    # Tolerate control-plane taints for redundancy
    taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule;dedicated=master:NoSchedule"
    # Auto-create default disk on labeled nodes
    createDefaultDiskLabeledNodes: true
    # Quick replica stale detection (30 min) for fast failure recovery in homelab
    replicaSoftAntiAffinity: true
    replicaAutoBalance: "least-effort"
    # Allow volumes on any node/disk when no selectors specified (homelab flexibility)
    allowEmptyNodeSelectorVolume: true
    allowEmptyDiskSelectorVolume: true
    # Engine settings
    defaultDataEngine: v1
    # Snapshot & backup settings
    snapshotDataIntegrity: ignored
    unmapMarkSnapChainRemoved: ignored

  defaultBackupStore:
    backupTarget: "nfs://<secret:kv/data/storage/nfs~server-ip>:/volume4/k3s-volumes/storage/longhorn-backups"

  longhornManager:
    nodeSelector:
      longhorn: "true"
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "dedicated"
        operator: "Equal"
        value: "master"
        effect: "NoSchedule"

  longhornUI:
    replicas: 1

  # Default Longhorn StorageClass configuration
  persistence:
    defaultClass: true
    defaultClassReplicaCount: 3
    # best-effort: prefer replicas on same node as pod (better read performance, no scheduling impact)
    defaultDataLocality: best-effort
    defaultFsType: ext4
    disableRevisionCounter: "true"
    # Quick stale replica detection (30 min) — faster recovery for homelab
    staleReplicaTimeout: "30"
    # Retain volumes after PVC deletion (manual cleanup required)
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    # Settings for snapshot/backup reliability
    unmapMarkSnapChainRemoved: ignored

# ──────────────────────────────────────────────
# Longhorn Extras (managed by this chart)
# ──────────────────────────────────────────────

# Ingress for Longhorn UI
ingress:
  enabled: true
  host: "longhorn.<secret:kv/data/domains~domain>"

# StorageClasses
# Note: The default "longhorn" storage class is created by the upstream Longhorn chart.
# Only manage additional custom storage classes here.
storageClasses:
  shared:
    enabled: true
    name: longhorn-shared
    isDefault: false
    reclaimPolicy: Retain
    replicas: 3
    # Quick stale replica detection (30 min) — matches default class
    staleReplicaTimeout: "30"
    # best-effort data locality for better performance
    dataLocality: best-effort
    fsType: ext4
    # NFS options for SMB operator compatibility
    nfsOptions: "vers=4.2,noresvport"
    description: "RWX shared storage via Longhorn SMB operator"

# RecurringJobs
recurringJobs:
  snapshot:
    enabled: true
    name: snapshot-2h
    cron: "0 */2 * * *"
    task: snapshot
    retain: 24
    concurrency: 2

  backupDaily:
    enabled: true
    name: backup-daily
    cron: "0 2 * * *"
    task: backup
    retain: 7
    concurrency: 2
    labels:
      backup-type: daily

  systemBackupDaily:
    enabled: true
    name: system-backup-daily
    cron: "0 3 * * *"
    task: system-backup
    retain: 7
    parameters:
      volume-backup-policy: if-not-present

# Volume protection policy
# Blocks deletion of Longhorn volumes with label: protect=true
volumeProtection:
  enabled: true
