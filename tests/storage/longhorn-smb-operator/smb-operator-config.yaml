---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smb-operator-config
  namespace: storage
data:
  config.yaml: |
    # Operator Configuration
    operator:
      namespace: storage
      reconcileInterval: 30
      useWatchAPI: true
      logLevel: INFO
      healthPort: 8080
    
    # SMB Server Configuration
    smb:
      deploymentName: smb-server
      serviceName: smb-server
      loadBalancerIP: 192.168.30.100  # Change this to your LoadBalancer IP
      image: dperson/samba:latest
      workgroup: WORKGROUP
      serverString: Homelab Storage Server
      guestAccount: nobody
      
    # Longhorn Configuration
    longhorn:
      namespace: storage
      group: longhorn.io
      version: v1beta2
      plural: volumes
    
    # Resource Limits
    resources:
      smbServer:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      operator:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    
    # Retry Configuration
    retry:
      maxRetries: 3
      initialDelay: 1
      backoffMultiplier: 2
      retryableStatusCodes: [409, 429, 500, 503, 504]
