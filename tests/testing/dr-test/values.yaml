# ──────────────────────────────────────────────
# DR Test — validates Longhorn volume survival
# ──────────────────────────────────────────────

# Root override for where to create Longhorn Volume CRs.  Using a centralized
# namespace keeps them independent of the application namespace.  Defaults to
# "storage" if omitted; we set it explicitly here for clarity.
longhornVolumeNamespace: storage

deployment:
  image:
    repository: busybox
    tag: latest

  # Override the default entrypoint
  command:
    - sh
    - -c
  args:
    - |
      FILE=/data/timestamp.txt

      if [ -f "$FILE" ]; then
        echo "========================================="
        echo "RECOVERY RUN — file found on volume"
        echo "========================================="
        echo "Original write timestamp:"
        cat "$FILE"
        echo ""
        echo "✅ DR TEST PASSED — data survived deletion"
        echo ""
        echo "Appending recovery timestamp..."
        echo "Recovered at: $(date)" >> "$FILE"
        echo ""
        echo "Final file state:"
        cat "$FILE"
      else
        echo "========================================="
        echo "FRESH RUN — no file found, writing now"
        echo "========================================="
        echo "Written at: $(date)" > "$FILE"
        echo "✅ Timestamp written:"
        cat "$FILE"
        echo ""
        echo "Now delete everything and re-apply to test recovery:"
        echo "  kubectl delete -f dr-test.yaml"
        echo "  kubectl delete pv dr-test-volume"
        echo "  kubectl apply -f dr-test.yaml"
      fi
      
      # Keep the container running indefinitely so the pod doesn't exit after 1 hour.
      # Use exec so tail replaces the shell (PID 1) and cleanly keeps the container alive.
      exec tail -f /dev/null

  # No ports needed for this test pod
  ports: {}

# No service needed
disableService: true

# ──────────────────────────────────────────────
# Longhorn volume storage
# ──────────────────────────────────────────────
storage:
  - type: longhorn
    mountPath: /data
    size: 1Gi
    nameSuffix: data

    # Longhorn-specific options
    # volumeName: dr-test-volume       # defaults to <release>-<chart>-<nameSuffix>
    # volumeNamespace: storage          # defaults to "storage"
    # storageClass: longhorn-retain     # defaults to "longhorn-retain" — use "longhorn-smb" for SMB operator
    # reclaimPolicy: Retain             # defaults to "Retain"
    # replicas: 3                       # defaults to 3
    # dataLocality: disabled            # defaults to "disabled"
    # fsType: ext4                      # defaults to "ext4"
    protect: true                       # adds ArgoCD Delete=false,Prune=false + protect label for VAP

    # Extra labels on the Longhorn Volume CR (overrides default backup labels)
    # labels:
    #   backup-type: daily
    #   recurring-job.longhorn.io/backup-daily: enabled

  # demonstrate a second volume created in a different namespace than the
  # global default; useful when moving applications between namespaces.
  - type: longhorn
    mountPath: /other
    size: 1Gi
    nameSuffix: other
    # force this volume's CR into a different namespace than the root value
    volumeNamespace: other-storage
    # use explicit name to avoid collision
    volumeName: dr-test-other
    protect: true
