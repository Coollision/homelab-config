# ──────────────────────────────────────────────
# DR Test — validates Longhorn volume survival
# ──────────────────────────────────────────────
# This chart demonstrates:
# 1. Longhorn volume persistence across pod recreation
# 2. Multi-service architecture with shared volumes (like HomeAssistant + DB)
# 3. RWX shared volume access via longhorn-shared storage class

# ──────────────────────────────────────────────
# Service 1: Data Writer
# Writes timestamp to /shared volume, persists across restarts
# ──────────────────────────────────────────────
writer:
  fullnameOverride: dr-test-writer
  deployment:
    image:
      repository: busybox
      tag: latest
    ports: {}
    
    command:
      - sh
      - -c
    args:
      - |
        FILE=/shared/timestamp.txt
        
        if [ -f "$FILE" ]; then
          echo "✅ WRITER: Found existing file, appending timestamp"
          echo "Written at: $(date)" >> "$FILE"
        else
          echo "✅ WRITER: Creating new file"
          echo "Written at: $(date)" > "$FILE"
        fi
        
        echo "File contents:"
        cat "$FILE"
        
        # Keep running
        exec tail -f /dev/null
  
  disableService: true
  
  # Share the RWX volume
  storage:
    - type: longhorn
      mountPath: /shared
      size: 1Gi
      nameSuffix: shared
      volumeName: dr-test-shared  # Explicit name for easy reference
      storageClass: longhorn-shared  # RWX via SMB
      protect: true

# ──────────────────────────────────────────────
# Service 2: Data Reader
# Reads and validates file from /shared volume
# ──────────────────────────────────────────────
reader:
  fullnameOverride: dr-test-reader
  deployment:
    image:
      repository: busybox
      tag: latest
    ports: {}
    
    command:
      - sh
      - -c
    args:
      - |
        FILE=/shared/timestamp.txt
        
        echo "✅ READER: Checking shared volume"
        
        if [ -f "$FILE" ]; then
          echo "✅ READER: File exists! Contents:"
          cat "$FILE"
        else
          echo "⚠️ READER: File not found yet (writer may not have run)"
          echo "Waiting for writer..."
        fi
        
        # Keep running
        exec tail -f /dev/null
  
  disableService: true
  
  # Share the same RWX volume
  storage:
    - type: longhorn
      mountPath: /shared
      size: 1Gi
      nameSuffix: shared
      volumeName: dr-test-shared  # Same volume as writer
      storageClass: longhorn-shared  # RWX
      protect: true

# ──────────────────────────────────────────────
# Longhorn volume storage (legacy single-service config)
# Kept for reference; new services use values above
# ──────────────────────────────────────────────
deployment:
  image:
    repository: busybox
    tag: latest

  # Override the default entrypoint
  command:
    - sh
    - -c
  args:
    - |
      FILE=/data/timestamp.txt

      if [ -f "$FILE" ]; then
        echo "========================================="
        echo "RECOVERY RUN — file found on volume"
        echo "========================================="
        echo "Original write timestamp:"
        cat "$FILE"
        echo ""
        echo "✅ DR TEST PASSED — data survived deletion"
        echo ""
        echo "Appending recovery timestamp..."
        echo "Recovered at: $(date)" >> "$FILE"
        echo ""
        echo "Final file state:"
        cat "$FILE"
      else
        echo "========================================="
        echo "FRESH RUN — no file found, writing now"
        echo "========================================="
        echo "Written at: $(date)" > "$FILE"
        echo "✅ Timestamp written:"
        cat "$FILE"
        echo ""
        echo "Now delete everything and re-apply to test recovery:"
        echo "  kubectl delete -f dr-test.yaml"
        echo "  kubectl delete pv dr-test-volume"
        echo "  kubectl apply -f dr-test.yaml"
      fi
      
      # Keep the container running indefinitely so the pod doesn't exit after 1 hour.
      # Use exec so tail replaces the shell (PID 1) and cleanly keeps the container alive.
      exec tail -f /dev/null

  # No ports needed for this test pod
  ports: {}

# No service needed
disableService: true

# ──────────────────────────────────────────────
# Longhorn volume storage
# ──────────────────────────────────────────────
storage:
  - type: longhorn
    mountPath: /data
    size: 1Gi
    nameSuffix: data

    # Longhorn-specific options
    # volumeName: dr-test-volume       # defaults to <release>-<chart>-<nameSuffix>
    # volumeNamespace: storage          # defaults to "storage"
    # storageClass: longhorn-shared     # defaults to "longhorn" (Retain) — use "longhorn-shared" for SMB operator
    # reclaimPolicy: Retain             # defaults to "Retain"
    # replicas: 3                       # defaults to 3
    # fsType: ext4                      # defaults to "ext4"
    protect: true                       # adds ArgoCD Delete=false,Prune=false + protect label for VAP

  - type: longhorn
    mountPath: /other
    size: 1Gi
    nameSuffix: other
    volumeName: dr-test-other
    protect: true
    storageClass: longhorn-shared
