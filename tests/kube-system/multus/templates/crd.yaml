# NetworkAttachmentDefinition CRD — must exist before any NAD resource is created.
# Sync wave -10 ensures this is applied before all other resources in this Application.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: network-attachment-definitions.k8s.cni.cncf.io
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  group: k8s.cni.cncf.io
  scope: Namespaced
  names:
    plural: network-attachment-definitions
    singular: network-attachment-definition
    kind: NetworkAttachmentDefinition
    shortNames:
      - net-attach-def
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: >
            NetworkAttachmentDefinition is a CRD schema specified by the Network Plumbing
            Working Group to express the intent for attaching pods to one or more logical
            or physical networks.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: NetworkAttachmentDefinitionSpec defines the desired state of NetworkAttachmentDefinition
              type: object
              properties:
                config:
                  description: >
                    NetworkAttachmentDefinition spec contains the pod network configuration
                    and definition.
                  type: string
