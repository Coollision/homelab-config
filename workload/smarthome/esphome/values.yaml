fullnameOverride: esphome
deployment:
  image:
    repository: ghcr.io/esphome/esphome
    tag: 2026.5.3
  ports:
    web: 6052
    webing: 6123
    webding: 5353

config:
  TZ: Europe/Brussels
  ESPHOME_DASHBOARD_USE_PING: "true"
  ESPHOME_DASHBOARD_RELATIVE_URL: "/"
resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 2000m
    memory: 96Mi
ingress_internal_secure:
  host: esphome.<secret:kv/data/domains~domain>
  port: web
storage:
  - mountPath: /config
    type: longhorn
    size: 15Gi
    volumeName: esphome
    storageClass: longhorn-shared
    replicas: 2  # firmware build cache, rebuildable — 2 replicas survive one node down
    protect: true
