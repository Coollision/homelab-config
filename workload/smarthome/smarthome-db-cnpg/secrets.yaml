# CNPG role credentials voor smarthome-db-pg
---
apiVersion: v1
kind: Secret
metadata:
  name: pgrole-n8n
  namespace: smarthome
type: kubernetes.io/basic-auth
stringData:
  username: n8n_user
  password: <secret:kv/data/smarthome/n8n~password>
---
apiVersion: v1
kind: Secret
metadata:
  name: pgrole-homeassistant
  namespace: smarthome
type: kubernetes.io/basic-auth
stringData:
  username: homeassistant_user
  password: <secret:kv/data/smarthome/homeassistant-db~password>   # reuse the existing MariaDB password key
---
# ConfigMap voor apps om de smarthome-db te bereiken
apiVersion: v1
kind: ConfigMap
metadata:
  name: smarthome-db
  namespace: smarthome
data:
  host: smarthome-db-pg-rw
  port: "5432"
  n8n_database: n8n
  homeassistant_database: homeassistant
