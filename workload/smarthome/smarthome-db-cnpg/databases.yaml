apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: db-n8n
  namespace: smarthome
spec:
  name: n8n
  owner: n8n_user
  cluster:
    name: smarthome-db-pg
  databaseReclaimPolicy: retain
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: db-homeassistant
  namespace: smarthome
spec:
  name: homeassistant
  owner: homeassistant_user
  cluster:
    name: smarthome-db-pg
  databaseReclaimPolicy: retain
