fullnameOverride: ha-mcp
deployment:
  image:
    repository: ghcr.io/homeassistant-ai/ha-mcp
    tag: 7.11.0
  # Run the OAuth 2.1 transport instead of the default stdio transport.
  # Each client logs in via a browser consent flow (Dynamic Client Registration)
  # and gets its own revocable token. Passed as args (= docker CMD) so the image's
  # own entrypoint is preserved, matching `docker run <image> ha-mcp-oauth`.
  args:
    - ha-mcp-oauth
  ports:
    web: 8086

config:
  TZ: Europe/Brussels

  # ha-mcp -> Home Assistant. Stays inside the cluster network; never crosses the LAN.
  # OAuth-only mode: each client supplies its own HA token via the browser consent flow.
  # The sentinel "oauth-mode-token" tells ha-mcp to skip static token validation;
  # it must be set explicitly because the image sets ENV HOMEASSISTANT_TOKEN="" which
  # would otherwise fail pydantic validation before the Python default kicks in.
  HOMEASSISTANT_TOKEN: oauth-mode-token
  HOMEASSISTANT_URL: http://homeassistant-service:8123

  # Public-facing base URL the clients connect to, and where the OAuth /authorize,
  # /token and /register endpoints live. MUST exactly match the ingress host below
  # (scheme + host), or the OAuth redirects break.
  MCP_BASE_URL: https://ha-mcp.<secret:kv/data/domains~domain>

  # Persists the key that signs/encrypts issued OAuth tokens across pod restarts,
  # so clients don't have to re-login every time the pod is rescheduled.
  # Vault value = output of `openssl rand -base64 32`.
  OAUTH_ENCRYPTION_KEY: <secret:kv/data/smarthome/ha-mcp~oauth-encryption-key>

  # HTTP listener binding (must match deployment.ports.web).
  MCP_PORT: "8086"

# Hardened container context. ha-mcp is a stateless Python service and needs no extra caps.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# LAN access for multiple PCs over TLS, internal only (websecure entrypoint, no external ingress).
# Reuses the wildcard cert for the internal domain that homeassistant already uses.
ingress_internal_secure:
  host: ha-mcp.<secret:kv/data/domains~domain>
  port: web

# The MCP endpoint rejects bare requests (anything without the secret path), so HTTP GET
# probes would fail health checks. A TCP check on the listening port is the correct signal.
probes:
  liveness:
    tcpSocket:
      port: web
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 4
  readiness:
    tcpSocket:
      port: web
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 4

resources:
  requests:
    cpu: 10m
    memory: 160Mi
  limits:
    cpu: 200m
    memory: 256Mi

labels:
  app.kubernetes.io/component: ha-mcp
