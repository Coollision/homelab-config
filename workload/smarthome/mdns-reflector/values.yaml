fullnameOverride: mdns-reflector

# mdns-repeater is a dumb L2 packet forwarder: it retransmits mDNS packets
# between interfaces VERBATIM and never re-authors/re-publishes records.
# Its predecessor here (flungo/avahi as a reflector) re-published records
# under its own responder, so OTBR's advertising proxy heard echoes of its
# own SRP-registered services back on net1, treated them as name conflicts,
# and rejected every device SRP (re-)registration with error:Duplicated →
# "Send fail response: 6" → devices never re-entered SRP/mDNS after any
# address churn → mass "unavailable" in HA that no restart could fix
# (525 rejections/12min observed on 2026-07-04).
# NOTE: mdns-repeater forwards IPv4 mDNS (224.0.0.251) only. That covers
# phone/HA discovery on VLAN 5 — AAAA/IPv6 addresses still travel inside
# the forwarded record payloads. If an IPv6-multicast-only querier ever
# shows up, revisit.
deployment:
  image:
    repository: monstrenyatko/mdns-repeater
    tag: "20230701"
  # image entrypoint is /app/run.sh; args select the app + interfaces
  # (-f = stay in foreground)
  args:
    - mdns-repeater-app
    - -f
    - net1
    - net2

config:
  TZ: Europe/Brussels

securityContext:
  capabilities:
    add:
      - NET_BIND_SERVICE
      - NET_RAW
      - NET_ADMIN

disableService: true

# Multus attaches both VLANs in MACVLAN bridge mode. Avahi binds to net1 and
# net2 (per allow-interfaces in the config above) and reflects mDNS between
# them so the Matter commissionable services advertised by the Thread Border
# Router on VLAN 40 are visible to phones/commissioners on VLAN 5.
multusNetworks:
  - name: mdns-reflector-vlan40
    interface: net1
    mac: 02:40:67:9d:64:61
    dhcpHostname: _stub_mdns-reflector-iot
    parentInterface: vlan40
    nodeLabelKey: vlan40-trunk
    type: macvlan
    mode: bridge
    chainedPlugins:
      - type: sbr
    ipam:
      type: dhcp
  - name: mdns-reflector-vlan5
    interface: net2
    mac: 02:05:67:9d:64:61
    dhcpHostname: _stub_mdns-reflector-lan
    parentInterface: vlan5
    nodeLabelKey: vlan5-trunk
    type: macvlan
    mode: bridge
    chainedPlugins:
      - type: sbr
    ipam:
      type: dhcp

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi

labels:
  app.kubernetes.io/component: mdns-reflector
