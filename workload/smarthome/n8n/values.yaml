fullnameOverride: n8n

statefulset:
  image:
    repository: n8nio/n8n
    tag: "2.32.3"
  ports:
    web: 5678

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

config:
  GENERIC_TIMEZONE: Europe/Brussels
  # Database (PostgreSQL via smarthome-db-pg)
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST:
    configMapKeyRef:
      name: smarthome-db
      key: host
  DB_POSTGRESDB_PORT:
    configMapKeyRef:
      name: smarthome-db
      key: port
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: <secret:kv/data/smarthome/n8n~user>
  DB_POSTGRESDB_PASSWORD: <secret:kv/data/smarthome/n8n~password>
  # n8n applicatie
  N8N_ENCRYPTION_KEY: <secret:kv/data/smarthome/n8n~encryption_key>
  N8N_HOST: n8n.<secret:kv/data/domains~domain>
  N8N_PORT: "5678"
  N8N_PROTOCOL: https
  WEBHOOK_URL: https://n8n.<secret:kv/data/domains~domain>/
  N8N_RUNNERS_ENABLED: "true"
  # Opschonen van oude uitvoeringen (7 dagen)
  EXECUTIONS_DATA_PRUNE: "true"
  EXECUTIONS_DATA_MAX_AGE: "168"

resources:
  requests:
    cpu: 20m
    memory: 448Mi
  limits:
    cpu: 400m
    memory: 640Mi

ingress_internal_secure:
  host: n8n.<secret:kv/data/domains~domain>
  port: web

storage:
  - mountPath: /home/node/.n8n
    size: 5Gi
    type: longhorn
    volumeName: n8n-data
    nameSuffix: data
