fullnameOverride: piper
deployment:
  image:
    repository: rhasspy/wyoming-piper
    tag: 2.3.1
  ports:
    piper-port: 10200
  args:
    - --voice
    - nl_BE-rdh-medium
    - --data-dir
    - /data
config:
  TZ: Europe/Brussels
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 1000m
    memory: 96Mi
storage:
  - mountPath: /data
    nameSuffix: data
    size: 512Mi
    type: longhorn
    volumeName: piper-data
    replicas: 2

affinity:
  node:
    required:
      - matchExpressions:
          - key: type
            operator: In
            values: ["mini"]
