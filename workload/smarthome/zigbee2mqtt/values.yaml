fullnameOverride: zigbee2mqtt
statefulset:
  image:
    repository: koenkk/zigbee2mqtt
    tag: 2.9.2
  ports:
    web: 8080
config:
  TZ: Europe/Brussels
  ZIGBEE2MQTT_DATA: /data

ingress_internal_secure:
  host: zigbee2mqtt.<secret:kv/data/domains~domain>
  port: web
ingress_internal:
  host: zigbee2mqtt.<secret:kv/data/domains~local>
  port: web
storage:
  - mountPath: /data
    type: longhorn
    volumeName: zigbee2mqtt
    storageClass: longhorn-shared
    size: 128Mi
    protect: true

affinity:
  node:
    required:
      - matchExpressions:
          - key: feature.node.kubernetes.io/iot-zigbee-coordinator
            operator: In
            values: ["true"]
