fullnameOverride: homeassistant
statefulset:
  image:
    repository: ghcr.io/home-assistant/home-assistant
    tag: 2026.7.3
  ports:
    web: 8123
config:
  TZ: Europe/Brussels
resources:
  requests:
    cpu: 50m
    memory: 2560Mi
  limits:
    cpu: 1000m
    memory: 3584Mi
securityContext:
  capabilities:
    add:
      - NET_RAW
      - NET_ADMIN

initContainers:
  - name: setup-thread-route
    image: busybox:1.38
    command:
      - sh
      - -c
      - |
        sleep 5
        ip -6 route replace fd77:3621:418:1::/64 via 2a02:a03f:f412:d601:40:67ff:fe9d:6464 dev net2 || true
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      capabilities:
        add:
          - NET_ADMIN

ingress_internal:
  host: homeassistant.<secret:kv/data/domains~local>
  port: web
ingress_internal_secure:
  host: homeassistant.<secret:kv/data/domains~domain>
  port: web
ingress_external_secure:
  host: homeassistant.<secret:kv/data/domains~domain>
  port: web
storage:
  - mountPath: /config
    size: 2Gi
    type: longhorn
    volumeName: homeassistant
    nameSuffix: config
    storageClass: longhorn-shared
    protect: true

multusNetworks:
  - name: homeassistant-vlan5
    interface: net2
    mac: 02:40:67:9d:64:65
    dhcpHostname: _stub_homeassistant-lan
    parentInterface: vlan5
    nodeLabelKey: vlan5-trunk
    type: macvlan
    mode: bridge
    chainedPlugins:
      - type: sbr
    ipam:
      type: dhcp
      routes:
        - dst: "::/0"
          gw: ""

hostNetwork: false
dnsPolicy: ClusterFirst
imagePreSync: true
serviceIp: <secret:kv/data/smarthome/homeassistant~ip>
probes:
  liveness:
    httpGet:
      path: /
      port: web
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    httpGet:
      path: /
      port: web
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5

labels:
  app.kubernetes.io/component: homeassistant

# No DB co-location affinity: the recorder moves to CNPG (smarthome-db-pg), whose pod can
# reschedule on failover, and same-node latency is negligible on the LAN for this workload.
# HA placement is driven by its vlan5-trunk macvlan node requirement instead.
