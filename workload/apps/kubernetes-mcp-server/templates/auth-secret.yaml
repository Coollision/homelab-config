apiVersion: v1
kind: Secret
metadata:
  name: mcp-basicauth
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kubernetes-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  # htpasswd bcrypt line "user:hash" — generated locally, stored in Vault.
  # Create with:  htpasswd -nbB mcp '<STRONG_RANDOM_TOKEN>'
  users: <secret:kv/data/apps/kubernetes-mcp~htpasswd>
