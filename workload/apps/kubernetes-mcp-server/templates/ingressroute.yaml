apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kubernetes-mcp-server-internal-secure
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kubernetes-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress_internal_secure.host }}`)
      middlewares:
        # Auth gate first, then the scale-to-zero wake gate — so an
        # unauthenticated request is rejected before it can ever wake the pod.
        - name: mcp-basicauth
          namespace: {{ .Release.Namespace }}
        - name: kubernetes-mcp-server-sablier
          namespace: {{ .Release.Namespace }}
      services:
        - kind: Service
          name: kubernetes-mcp-server
          namespace: {{ .Release.Namespace }}
          port: 8080
  tls: {}
