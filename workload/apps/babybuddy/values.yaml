fullnameOverride: babybuddy

statefulset:
  image:
    repository: lscr.io/linuxserver/babybuddy
    tag: 2.8.0
  ports:
    http: 8000

config:
  PUID: "1000"
  PGID: "1000"
  TZ: Europe/Brussels
  ALLOWED_HOSTS: babybuddy.<secret:kv/data/domains~domain>
  CSRF_TRUSTED_ORIGINS: https://babybuddy.<secret:kv/data/domains~domain>
  SECURE_PROXY_SSL_HEADER: "True"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 400m
    memory: 512Mi

ingress_internal_secure:
  host: babybuddy.<secret:kv/data/domains~domain>
  port: http
ingress_external_secure:
  host: babybuddy.<secret:kv/data/domains~domain>
  port: http

storage:
  - mountPath: /config
    size: 2Gi
    type: longhorn
