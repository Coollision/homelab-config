apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-db-init
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgres:16-alpine
          command:
            - /bin/sh
            - -c
            - |
              set -e

              DB_HOST="{{ .Release.Name }}-postgresql-hl"
              DB_PORT="5432"

              echo "Waiting for PostgreSQL at $DB_HOST:$DB_PORT..."
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U postgres; do
                echo "  not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready."

              run_psql() {
                PGPASSWORD="$POSTGRES_PASSWORD" psql \
                  -h "$DB_HOST" -p "$DB_PORT" -U postgres \
                  -v ON_ERROR_STOP=1 "$@"
              }

              create_role_if_not_exists() {
                local user="$1"
                local pass="$2"
                run_psql -c "
                  DO \$\$
                  BEGIN
                    IF NOT EXISTS (
                      SELECT FROM pg_catalog.pg_roles WHERE rolname = '${user}'
                    ) THEN
                      CREATE ROLE \"${user}\" WITH LOGIN PASSWORD '${pass}';
                    ELSE
                      ALTER ROLE \"${user}\" WITH PASSWORD '${pass}';
                    END IF;
                  END
                  \$\$;"
              }

              create_db_if_not_exists() {
                local db="$1"
                local owner="$2"
                local exists
                exists=$(run_psql -tAc \
                  "SELECT 1 FROM pg_database WHERE datname='${db}'")
                if [ "$exists" != "1" ]; then
                  run_psql -c "CREATE DATABASE \"${db}\" OWNER \"${owner}\";"
                fi
                run_psql -c \
                  "GRANT ALL PRIVILEGES ON DATABASE \"${db}\" TO \"${owner}\";"
              }

              # ── Users ──────────────────────────────────────────────────────
              SONARR_USER=$(cat /run/secrets/sonarr_user)
              SONARR_PASS=$(cat /run/secrets/sonarr_password)
              RADARR_USER=$(cat /run/secrets/radarr_user)
              RADARR_PASS=$(cat /run/secrets/radarr_password)
              PROWLARR_USER=$(cat /run/secrets/prowlarr_user)
              PROWLARR_PASS=$(cat /run/secrets/prowlarr_password)
              BAZARR_USER=$(cat /run/secrets/bazarr_user)
              BAZARR_PASS=$(cat /run/secrets/bazarr_password)
              JELLYSEERR_USER=$(cat /run/secrets/jellyseerr_user)
              JELLYSEERR_PASS=$(cat /run/secrets/jellyseerr_password)

              create_role_if_not_exists "$SONARR_USER"    "$SONARR_PASS"
              create_role_if_not_exists "$RADARR_USER"    "$RADARR_PASS"
              create_role_if_not_exists "$PROWLARR_USER"  "$PROWLARR_PASS"
              create_role_if_not_exists "$BAZARR_USER"    "$BAZARR_PASS"
              create_role_if_not_exists "$JELLYSEERR_USER" "$JELLYSEERR_PASS"

              # ── Databases ──────────────────────────────────────────────────
              create_db_if_not_exists "sonarr_main"   "$SONARR_USER"
              create_db_if_not_exists "sonarr_log"    "$SONARR_USER"
              create_db_if_not_exists "radarr_main"   "$RADARR_USER"
              create_db_if_not_exists "radarr_log"    "$RADARR_USER"
              create_db_if_not_exists "prowlarr_main" "$PROWLARR_USER"
              create_db_if_not_exists "prowlarr_log"  "$PROWLARR_USER"
              create_db_if_not_exists "bazarr_main"   "$BAZARR_USER"
              create_db_if_not_exists "jellyseerr"    "$JELLYSEERR_USER"

              echo "Database initialisation complete."
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: postgres-password
          volumeMounts:
            - name: db-secrets
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: db-secrets
          secret:
            secretName: services-db
