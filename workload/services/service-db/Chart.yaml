apiVersion: v2
name: service-db
version: 0.1.0
dependencies:
  - name: postgresql
    version: 18.7.0
    # OCI registry instead of the classic https repo: the Bitnami classic
    # index.yaml is huge and helm loads it whole into RAM to resolve deps
    # (~540Mi peak), which OOMKilled the repo-server CMP sidecar. OCI pulls the
    # exact chart by version with no index (~60Mi peak). Same artifact, renders
    # byte-identical. Renovate/Mend tracks oci:// helm deps natively.
    repository: oci://registry-1.docker.io/bitnamicharts
