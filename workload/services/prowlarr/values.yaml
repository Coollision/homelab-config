fullnameOverride: prowlarr

statefulset:
  image:
    repository: linuxserver/prowlarr
    tag: "2.3.0"
    imagePullPolicy: Always
  ports:
    web: 9696

config:
  TZ: Europe/Brussels
  PUID: "1000"
  PGID: "1000"

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 300m

probes:
  readiness:
    httpGet:
      port: 9696
      path: /ping
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    httpGet:
      port: 9696
      path: /ping
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

ingress_internal:
  host: prowlarr.<secret:kv/data/domains~local>
  port: web

ingress_external_secure:
  host: prowlarr.<secret:kv/data/domains~domain>
  port: web

storage:
  - mountPath: /config
    type: longhorn
    size: 8Gi
    nameSuffix: config
    volumeName: arr-stack-prowlarr-config
    protect: true

podSecurityContext:
  fsGroup: 1000

initContainers:
  - name: prowlarr-init
    image: alpine
    command:
      - "/bin/sh"
      - "-c"
      - cp /init/script.sh /tmp && chmod +x /tmp/script.sh && /tmp/script.sh
    resources: {}
    env:
      - name: CONFIG_FILE
        value: /config/config.xml
      - name: POSTGRES_USER
        valueFrom:
          secretKeyRef:
            name: services-db
            key: prowlarr_user
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: services-db
            key: prowlarr_password
      - name: POSTGRES_HOST
        valueFrom:
          configMapKeyRef:
            name: service-db
            key: host
      - name: POSTGRES_PORT
        valueFrom:
          configMapKeyRef:
            name: service-db
            key: port
      - name: POSTGRES_MAIN_DB
        valueFrom:
          configMapKeyRef:
            name: service-db
            key: prowlarr_database
      - name: POSTGRES_LOG_DB
        valueFrom:
          configMapKeyRef:
            name: service-db
            key: prowlarr_database_logs
    volumeMounts:
      - mountPath: /init
        name: arr-init-script
      - mountPath: /config
        name: prowlarr-config

extraVolumes:
  - name: arr-init-script
    configMap:
      name: arr-init-script
