# Declarative databases. Adopts the imported DBs (owner matches current: postgres).
# databaseReclaimPolicy: retain -> deleting a Database CR (e.g. to deprovision an
# app) NEVER drops the data; the schema/data stays on the PVC.
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: db-sonarr-main
  namespace: services
spec:
  name: sonarr_main
  owner: postgres
  cluster:
    name: service-db-pg
  databaseReclaimPolicy: retain
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: db-sonarr-log
  namespace: services
spec:
  name: sonarr_log
  owner: postgres
  cluster:
    name: service-db-pg
  databaseReclaimPolicy: retain
