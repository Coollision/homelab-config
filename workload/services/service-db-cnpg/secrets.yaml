# Superuser creds for CNPG to connect to the OLD Bitnami DB during monolith import.
apiVersion: v1
kind: Secret
metadata:
  name: pg-bitnami-superuser
  namespace: services
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: <secret:kv/data/services~db_root-pass>
---
# Per-role creds (same Vault passwords the *arr apps already use) so CNPG
# managed.roles can declaratively own users/passwords going forward.
apiVersion: v1
kind: Secret
metadata:
  name: pgrole-sonarr
  namespace: services
type: kubernetes.io/basic-auth
stringData:
  username: sonarr_user
  password: <secret:kv/data/services~sonarr_password>
---
