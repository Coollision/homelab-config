apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: service-db-pg
  namespace: services
spec:
  instances: 1
  # Bind to the pre-created NAMED Longhorn volume (service-db-pg-data) instead of
  # dynamically provisioning a random pvc-<uuid> -> named + backup-labeled + restorable.
  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: longhorn
      volumeName: service-db-pg-data

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # Bootstrap empty; data is restored from a pg_dumpall of the prior cluster.
  bootstrap:
    initdb: {}

  # Declarative user/password lifecycle (Vault-backed). Roles are also present in
  # the restored dump; managed.roles keeps them reconciled going forward.
  managed:
    roles:
      - name: sonarr_user
        ensure: present
        login: true
        passwordSecret:
          name: pgrole-sonarr
      - name: radarr_user
        ensure: present
        login: true
        passwordSecret:
          name: pgrole-radarr
      - name: prowlarr_user
        ensure: present
        login: true
        passwordSecret:
          name: pgrole-prowlarr
      - name: bazarr_user
        ensure: present
        login: true
        passwordSecret:
          name: pgrole-bazarr
      - name: jellyseerr_user
        ensure: present
        login: true
        passwordSecret:
          name: pgrole-jellyseerr
