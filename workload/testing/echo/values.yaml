deployment:
  image:
    repository: mendhak/http-https-echo

  ports:
    http: 8080
    https: 8443

ingress_internal:
  host: echo.<secret:kv/data/domains~local>
  path: /
  port: http

ingress_internal_secure:
  host: echo.<secret:kv/data/domains~domain>
  path: /
  port: http

scaleToZero:
  enabled: true
  sessionDuration: 2m  # temporary — shortened for testing the idle scale-down; revert to default (30m) after
