# Personal admin/superuser login for CloudBeaver (view/update/maintain all DBs).
# Reuses the former Bitnami root password from Vault.
apiVersion: v1
kind: Secret
metadata:
  name: pgrole-dbadmin
  namespace: arr-stack
type: kubernetes.io/basic-auth
stringData:
  username: dbadmin
  password: <secret:kv/data/services~db_root-pass>
