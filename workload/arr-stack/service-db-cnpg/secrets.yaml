# Per-role creds (same Vault passwords the *arr apps already use) so CNPG
# managed.roles can declaratively own users/passwords going forward.
apiVersion: v1
kind: Secret
metadata:
  name: pgrole-sonarr
  namespace: arr-stack
type: kubernetes.io/basic-auth
stringData:
  username: sonarr_user
  password: <secret:kv/data/services~sonarr_password>
---
