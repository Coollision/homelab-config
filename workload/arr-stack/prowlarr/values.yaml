fullnameOverride: prowlarr
statefulset:
  image:
    repository: linuxserver/prowlarr
    tag: 2.4.0
    imagePullPolicy: Always
  ports:
    web: 9696

config:
  TZ: Europe/Brussels
  PUID: 1000
  PGID: 1000

arrXmlPostgres:
  enabled: true
  requireExistingConfig: false
  userKey: prowlarr_user
  passwordKey: prowlarr_password
  mainDbKey: prowlarr_database
  logDbKey: prowlarr_database_logs

resources:
  requests:
    cpu: 10m
    memory: 256Mi
  limits:
    cpu: 400m
    memory: 352Mi

podSecurityContext:
  fsGroup: 1000

ingress_internal:
  host: prowlarr.<secret:kv/data/domains~local>
  port: web

ingress_internal_secure:
  host: prowlarr.<secret:kv/data/domains~domain>
  port: web

storage:
  - type: longhorn
    mountPath: /config
    size: 1Gi
    nameSuffix: config
    volumeName: arr-stack-prowlarr-config
    protect: true
