apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  ignoreApplicationDifferences:
    - jqPathExpressions:
        - .spec.syncPolicy
  generators:
    - git:
        repoURL: https://github.com/Coollision/homelab-config.git
        revision: master
        directories:
          - path: workload/*/*
          - path: workload/*/disabled-*
            exclude: true
  template:
    metadata:
      name: "{{.path.basename}}"
      annotations:
        argocd.argoproj.io/manifest-generate-paths: "/{{.path.path}};/lib/shared-lib;/lib/longhorn-storage-lib;/lib/arr-lib"
    spec:
      project: workloads
      source:
        repoURL: https://github.com/Coollision/homelab-config.git
        targetRevision: master
        path: "{{.path.path}}"
        plugin:
          name: argocd-lovely-plugin
      destination:
        namespace: "{{index .path.segments 1}}"
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - RespectIgnoreDifferences=true
      revisionHistoryLimit: 3
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jqPathExpressions:
            - .webhooks[]?.clientConfig.caBundle
        # BEGIN scale-to-zero autogen — generated by scripts/gen-scale-to-zero-ignores.sh, do not hand-edit
        - group: apps
          kind: Deployment
          name: cloudbeaver
          namespace: databases
          jsonPointers:
            - /spec/replicas
        - group: apps
          kind: Deployment
          name: esphome
          namespace: smarthome
          jsonPointers:
            - /spec/replicas
        - group: apps
          kind: Deployment
          name: ha-mcp
          namespace: smarthome
          jsonPointers:
            - /spec/replicas
        - group: apps
          kind: Deployment
          name: echo
          namespace: testing
          jsonPointers:
            - /spec/replicas
        # END scale-to-zero autogen
        # Manual entry — kubernetes-mcp-server isn't a shared-lib app (wraps a
        # separate upstream OCI chart with no values-driven scaleToZero flag to
        # scan), so it can't go through the generator above. Wired via a
        # kustomize label patch instead; keep this entry outside the markers or
        # the next regen run will delete it.
        - group: apps
          kind: Deployment
          name: kubernetes-mcp-server
          namespace: apps
          jsonPointers:
            - /spec/replicas
