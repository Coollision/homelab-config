apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: system-config
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  ignoreApplicationDifferences:
    - jqPathExpressions:
        - .spec.syncPolicy
  generators:
    - git:
        repoURL: https://github.com/Coollision/homelab-config.git
        revision: master
        directories:
          - path: system/*/*
          - path: system/*/disabled-*
            exclude: true
  template:
    metadata:
      name: "{{.path.basename}}"
      annotations:
        argocd.argoproj.io/manifest-generate-paths: "/{{.path.path}};/lib/shared-lib;/lib/longhorn-storage-lib"
    spec:
      project: system
      source:
        repoURL: https://github.com/Coollision/homelab-config.git
        targetRevision: master
        path: "{{.path.path}}"
        plugin:
          name: argocd-lovely-plugin
      destination:
        namespace: "{{index .path.segments 1}}"
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - RespectIgnoreDifferences=true
      revisionHistoryLimit: 2
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jqPathExpressions:
            - .webhooks[]?.clientConfig.caBundle
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jqPathExpressions:
            - '.spec?.conversion?.webhook?.clientConfig?.caBundle'
        - group: ""
          kind: ConfigMap
          name: smb-operator-migration
          namespace: storage
          jqPathExpressions:
            - .data
        # BEGIN scale-to-zero autogen — generated by scripts/gen-scale-to-zero-ignores.sh, do not hand-edit
        - group: apps
          kind: Deployment
          name: peanut
          namespace: nut
          jsonPointers:
            - /spec/replicas
        # END scale-to-zero autogen
        # Manual entry — longhorn-ui isn't a shared-lib app (vendored chart,
        # wired via a kustomize label patch instead of a values.yaml flag), so
        # it can't go through the generator above. Keep outside the markers or
        # the next regen run will delete it.
        - group: apps
          kind: Deployment
          name: longhorn-ui
          namespace: storage
          jsonPointers:
            - /spec/replicas
