name: aws-tunnels-operator

on:
  push:
    branches:
      - orphan/aws-tunnels-operator-standalone
    paths:
      - "aws-tunnels-operator/**"
      - ".github/workflows/aws-tunnels-operator.yaml"
    tags:
      - "aws-tunnels-operator/v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/coollision/aws-tunnels-operator
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws-tunnels-operator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: aws-tunnels-operator/go.mod
          cache-dependency-path: aws-tunnels-operator/go.sum

      - name: Run tests
        run: go test ./...

  versioning:
    name: Versioning
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Resolve semantic version and update chart files
        id: version
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          chart_file="aws-tunnels-operator/chart/Chart.yaml"
          values_file="aws-tunnels-operator/chart/values.yaml"

          current_version=$(grep '^version:' "$chart_file" | awk '{print $2}')
          current_major=${current_version%%.*}
          current_minor_patch=${current_version#*.}
          current_minor=${current_minor_patch%%.*}
          current_patch=${current_version##*.}

          if [[ "$REF_TYPE" == "tag" && "$REF_NAME" =~ ^aws-tunnels-operator/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            next_version="${BASH_REMATCH[1]}"
            bump_type="tag"
          else
            log_range=""
            if [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
              log_range="${BEFORE_SHA}..${CURRENT_SHA}"
            fi

            commit_messages=""
            if [[ -n "$log_range" ]]; then
              commit_messages=$(git log --format='%s%n%b' "$log_range" -- aws-tunnels-operator .github/workflows/aws-tunnels-operator.yaml || true)
            else
              commit_messages=$(git log --format='%s%n%b' -n 20 -- aws-tunnels-operator .github/workflows/aws-tunnels-operator.yaml || true)
            fi

            bump_type="patch"
            if echo "$commit_messages" | grep -Eiq 'BREAKING CHANGE|^[a-z]+(\([^)]+\))?!:'; then
              bump_type="major"
            elif echo "$commit_messages" | grep -Eiq '^feat(\([^)]+\))?:'; then
              bump_type="minor"
            fi

            next_major=$current_major
            next_minor=$current_minor
            next_patch=$current_patch

            case "$bump_type" in
              major)
                next_major=$((current_major + 1))
                next_minor=0
                next_patch=0
                ;;
              minor)
                next_minor=$((current_minor + 1))
                next_patch=0
                ;;
              patch)
                next_patch=$((current_patch + 1))
                ;;
            esac

            next_version="${next_major}.${next_minor}.${next_patch}"
          fi

          image_tag="v${next_version}"

          sed -i -E "s/^version: .*/version: ${next_version}/" "$chart_file"
          sed -i -E "s/^appVersion: .*/appVersion: ${next_version}/" "$chart_file"
          sed -i -E "s/^  tag: .*/  tag: ${image_tag}/" "$values_file"
          sed -i -E "s|^(#\s*      image: ghcr\.io/coollision/aws-tunnels-operator:).*|\1${image_tag}|" "$values_file"

          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved version ${next_version} via ${bump_type} bump"

      - name: Commit version updates
        if: github.ref_type == 'branch'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- aws-tunnels-operator/chart/Chart.yaml aws-tunnels-operator/chart/values.yaml; then
            echo "No version file updates to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aws-tunnels-operator/chart/Chart.yaml aws-tunnels-operator/chart/values.yaml
          git commit -m "chore(release): bump aws-tunnels-operator to ${{ steps.version.outputs.image_tag }} [skip ci]"
          git push

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [test, versioning]
    strategy:
      matrix:
        arch: [amd64, arm64]
    defaults:
      run:
        working-directory: aws-tunnels-operator
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: aws-tunnels-operator/go.mod
          cache-dependency-path: aws-tunnels-operator/go.sum

      - name: Build linux/${{ matrix.arch }} binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go build -trimpath -ldflags="-s -w" -o dist/manager-linux-${{ matrix.arch }} ./

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: manager-linux-${{ matrix.arch }}
          path: aws-tunnels-operator/dist/manager-linux-${{ matrix.arch }}
          if-no-files-found: error

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, versioning, build-binaries]
    outputs:
      image-tag: ${{ needs.versioning.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: manager-linux-amd64
          path: aws-tunnels-operator/dist

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: manager-linux-arm64
          path: aws-tunnels-operator/dist

      - name: Ensure binaries are executable
        run: chmod +x aws-tunnels-operator/dist/manager-linux-amd64 aws-tunnels-operator/dist/manager-linux-arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: aws-tunnels-operator
          file: aws-tunnels-operator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.image-tag }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-chart:
    name: Publish Helm Chart (OCI)
    runs-on: ubuntu-latest
    needs: [versioning, build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR for Helm OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push chart (release tag)
        if: startsWith(github.ref, 'refs/tags/aws-tunnels-operator/v')
        run: |
          helm package aws-tunnels-operator/chart --destination .
          CHART_TGZ=$(ls aws-tunnels-operator-*.tgz | head -n 1)
          helm push "$CHART_TGZ" oci://ghcr.io/coollision/charts

      - name: Package and push chart (branch chart changes)
        if: github.ref_type == 'branch'
        run: |
          helm package aws-tunnels-operator/chart --destination .
          CHART_TGZ=$(ls aws-tunnels-operator-*.tgz | head -n 1)
          helm push "$CHART_TGZ" oci://ghcr.io/coollision/charts
