- name: Configure k3s prerequisites
  hosts: k3scluster
  become: true
  roles:
    - role: k3s_pre
      vars:
        # curl -s https://api.github.com/repos/k3s-io/k3s/releases/latest | jq -r .tag_name
        k3s_pre_version: v1.35.3+k3s1
    - role: vlan-trunk

- name: K3s setup - master
  hosts: k3smaster
  become: true
  serial: 1
  roles:
    - k3s_master
  # NOTE: k3s.<zone> / ingress / wildcard DNS records moved to playbooks/dns.yml
  # (runs after the cluster is up). The Synology slave answers these during bring-up.

- name: K3s setup - workers
  hosts: k3sworkers
  become: true
  roles:
    - k3s_worker
