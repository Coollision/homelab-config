---
host_ip_address: 123.456.789.123
ansible_user: user
dns_record_name: node-s.pi
dns_record_value: "{{ host_ip_address }}"
ansible_python_interpreter: /usr/bin/python3
k3s_node_name: master-s
k3s_flannel_iface: enp3s0
k3s_node_label:
  - type=vm
  - node.longhorn.io/create-default-disk=config
k3s_node_taint:
  - dedicated=master:NoSchedule

k3s_node_annotations:
  node.longhorn.io/default-disks-config: '[{"path":"/mnt/longhorn","allowScheduling":true,"tags":["fast"]}]'

longhorn_disk_device: /dev/sda3


# VM — hypervisor steal spikes cause kubelet lease timeouts
# Relaxed values to prevent false NotReady flips
k3s_node_status_update_frequency: "20s"