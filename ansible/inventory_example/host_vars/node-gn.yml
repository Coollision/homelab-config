---
host_ip_address: 123.456.789.123
ansible_user: user
dns_record_name: node-gn.local-domain
dns_record_value: "{{ host_ip_address }}"
ansible_python_interpreter: /usr/bin/python3

k3s_node_name: master-gn
k3s_flannel_iface: enp1s0

k3s_node_label:
  - kubefledged.io/cache=true
  - type=mini
  - node.longhorn.io/create-default-disk=config
  - vlan40-trunk=true
  - vlan5-trunk=true

vlan_trunk_interfaces:
  - id: 40
    parent_interface: enp1s0
    interface_name: vlan40
  - id: 5
    parent_interface: enp1s0
    interface_name: vlan5

k3s_node_annotations:
  node.longhorn.io/default-disks-config: '[{"path":"/mnt/longhorn","allowScheduling":true,"tags":["fast"]}]'

longhorn_disk_device: /dev/nvme0n1p3
