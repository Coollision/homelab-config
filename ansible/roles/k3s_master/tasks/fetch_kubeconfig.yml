- name: Fetch kubeconfig
  ansible.builtin.fetch:
    become: true
    src: /etc/rancher/k3s/k3s.yaml
    dest: ./kubeconfig/config.yaml
    flat: true
  changed_when: false

- name: Fix kubeconfig server address
  become: false
  ansible.builtin.replace:
    path: ./kubeconfig/config.yaml
    regexp: '127\.0\.0\.1'
    replace: "{{ k3s_master_domain_name }}"
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Fix kubeconfig cluster name
  become: false
  ansible.builtin.replace:
    path: ./kubeconfig/config.yaml
    regexp: 'default'
    replace: "{{ k3s_cluster_name | default('k3s') }}"
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Ensure ~/.kube directory exists
  become: false
  ansible.builtin.file:
    path: ~/.kube
    state: directory
    mode: '0700'
  delegate_to: localhost
  run_once: true

- name: Check if local kubeconfig exists
  become: false
  ansible.builtin.stat:
    path: ~/.kube/config
  register: local_kubeconfig
  delegate_to: localhost
  run_once: true

- name: Create empty kubeconfig if it doesn't exist
  become: false
  ansible.builtin.copy:
    content: |
      apiVersion: v1
      kind: Config
      clusters: []
      contexts: []
      users: []
    dest: ~/.kube/config
    mode: '0600'
  when: not local_kubeconfig.stat.exists
  delegate_to: localhost
  run_once: true

- name: Check if cluster already exists in local kubeconfig
  become: false
  ansible.builtin.shell:
    cmd: kubectl config get-clusters | grep -w "{{ k3s_cluster_name | default('k3s') }}" || true
  register: cluster_exists
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Remove existing cluster context if it exists (to overwrite)
  become: false
  ansible.builtin.shell:
    cmd: |
      kubectl config delete-context "{{ k3s_cluster_name | default('k3s') }}" 2>/dev/null || true
      kubectl config delete-cluster "{{ k3s_cluster_name | default('k3s') }}" 2>/dev/null || true
      kubectl config delete-user "{{ k3s_cluster_name | default('k3s') }}" 2>/dev/null || true
  when: cluster_exists.stdout != ""
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Merge kubeconfig into local config
  become: false
  ansible.builtin.shell:
    cmd: |
      KUBECONFIG=~/.kube/config:./kubeconfig/config.yaml kubectl config view --merge --flatten > ~/.kube/config.tmp
      mv ~/.kube/config.tmp ~/.kube/config
      chmod 600 ~/.kube/config
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Set new cluster as current context
  become: false
  ansible.builtin.shell:
    cmd: kubectl config use-context "{{ k3s_cluster_name | default('k3s') }}"
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Clean up temporary kubeconfig
  become: false
  ansible.builtin.file:
    path: ./kubeconfig/config.yaml
    state: absent
  delegate_to: localhost
  run_once: true