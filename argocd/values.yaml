vault:
  addr: http://vault.secrets.svc.cluster.local:8200
  role: argocd-role

ingress:
  host: argocd.<secret:kv/data/domains~domain>

argo-cd:
  fullnameOverride: argocd
  # global:
  #   domain: argocd.<secret:kv/data/domains~domain>
  crds:
    keep: false
  configs:
    cm:
      exec.enabled: "true"
      timeout.reconciliation: 5m
      timeout.reconciliation.jitter: 2m
      repos.server.timeout.seconds: "300"
      # Garbage collection
      server.default.logout.url: https://argocd.<secret:kv/data/domains~domain>/
      application.resourceTrackingMethod: annotation
      resource.exclusions: |
        # ### Network resources created by the Kubernetes control plane and excluded to reduce the number of watched events and UI clutter
        # - apiGroups:
        #   - ''
        #   - discovery.k8s.io
        #   kinds:
        #   - Endpoints
        #   - EndpointSlice
        ### Internal Kubernetes resources excluded reduce the number of watched events
        - apiGroups:
          - coordination.k8s.io
          kinds:
          - Lease
        ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
        - apiGroups:
          - authentication.k8s.io
          - authorization.k8s.io
          kinds:
          - SelfSubjectReview
          - TokenReview
          - LocalSubjectAccessReview
          - SelfSubjectAccessReview
          - SelfSubjectRulesReview
          - SubjectAccessReview
        ### Intermediate Certificate Request excluded reduce the number of watched events
        - apiGroups:
          - certificates.k8s.io
          kinds:
          - CertificateSigningRequest
        - apiGroups:
          - cert-manager.io
          kinds:
          - CertificateRequest
        ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
        - apiGroups:
          - cilium.io
          kinds:
          - CiliumIdentity
          - CiliumEndpoint
          - CiliumEndpointSlice
        ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
        - apiGroups:
          - kyverno.io
          - reports.kyverno.io
          - wgpolicyk8s.io
          kinds:
          - PolicyReport
          - ClusterPolicyReport
          - EphemeralReport
          - ClusterEphemeralReport
          - AdmissionReport
          - ClusterAdmissionReport
          - BackgroundScanReport
          - ClusterBackgroundScanReport
          - UpdateRequest
        ### Longhorn backup/snapshot resources are runtime data and should not be pruned by GitOps
        - apiGroups:
          - longhorn.io
          kinds:
          - Snapshot
          - Backup
          - BackupVolume
          - BackupBackingImage
          - SystemBackup
          - SystemRestore
      resource.customizations.health.longhorn.io_ShareManager: |
        hs = {}
        if obj.status == nil or obj.status.state == nil then
          hs.status = "Progressing"
          hs.message = "Waiting for Longhorn share manager status"
          return hs
        end

        if obj.status.state == "running" then
          hs.status = "Healthy"
          hs.message = "Longhorn share manager is running"
          return hs
        end

        if obj.status.state == "error" then
          hs.status = "Degraded"
          hs.message = "Longhorn share manager is in error state"
          return hs
        end

        hs.status = "Progressing"
        hs.message = "Longhorn share manager state: " .. obj.status.state
        return hs
      resource.customizations.health.longhorn.io_Volume: |
        hs = {}
        if obj.status == nil then
          hs.status = "Progressing"
          hs.message = "Waiting for Longhorn volume status"
          return hs
        end

        if obj.status.robustness == "healthy" and (obj.status.state == "attached" or obj.status.state == "detached") then
          hs.status = "Healthy"
          hs.message = "Longhorn volume is " .. obj.status.state .. " and healthy"
          return hs
        end

        -- A detached volume reports robustness "unknown", not "healthy" —
        -- Longhorn only assesses replica health while something has it
        -- attached, so "unknown" here means "not in use", not a fault.
        -- Sablier (scale-to-zero) detaches volumes routinely on idle, so
        -- without this every sleeping app with a PVC shows stuck
        -- "Progressing" forever instead of Healthy.
        if obj.status.state == "detached" and obj.status.robustness == "unknown" then
          hs.status = "Healthy"
          hs.message = "Longhorn volume is detached (not in use)"
          return hs
        end

        if obj.status.robustness == "faulted" then
          hs.status = "Degraded"
          hs.message = "Longhorn volume is faulted"
          return hs
        end

        hs.status = "Progressing"
        hs.message = "Longhorn volume state: " .. (obj.status.state or "unknown") .. ", robustness: " .. (obj.status.robustness or "unknown")
        return hs
      resource.customizations.health.Pod: |
        hs = {}

        local function isPodReady()
          if obj.status ~= nil and obj.status.conditions ~= nil then
            for _, condition in ipairs(obj.status.conditions) do
              if condition.type == "Ready" and condition.status == "True" then
                return true
              end
            end
          end
          return false
        end

        local isLonghornShareManager = false
        if obj.metadata ~= nil and obj.metadata.labels ~= nil then
          if obj.metadata.labels["longhorn.io/component"] == "share-manager" then
            isLonghornShareManager = true
          end
        end

        if obj.status == nil or obj.status.phase == nil then
          hs.status = "Progressing"
          hs.message = "Waiting for pod status"
          return hs
        end

        if obj.status.phase == "Pending" then
          hs.status = "Progressing"
          hs.message = obj.status.message or "Pod is pending"
          return hs
        end

        if obj.status.phase == "Succeeded" then
          hs.status = "Healthy"
          hs.message = obj.status.message or "Pod completed successfully"
          return hs
        end

        if obj.status.phase == "Failed" then
          hs.status = "Degraded"
          hs.message = obj.status.message or "Pod failed"
          return hs
        end

        if obj.status.phase == "Running" then
          if obj.spec ~= nil and obj.spec.restartPolicy == "Always" then
            if isPodReady() then
              hs.status = "Healthy"
              hs.message = obj.status.message or "Pod is running and ready"
              return hs
            end

            hs.status = "Progressing"
            hs.message = obj.status.message or "Pod is running but not ready"
            return hs
          end

          if isLonghornShareManager and isPodReady() then
            hs.status = "Healthy"
            hs.message = "Longhorn share-manager pod is running and ready"
            return hs
          end

          hs.status = "Progressing"
          hs.message = obj.status.message or "Pod is running"
          return hs
        end

        hs.status = "Unknown"
        hs.message = obj.status.message or "Pod health is unknown"
        return hs

    params:
      server.insecure: true
      server.disable.auth: false
      server.repo.server.timeout.seconds: "300"
      controller.repo.server.timeout.seconds: "300"
      # CONCURRENCY CONTROL FOR THE CMP SIDECAR.
      # NOTE: reposerver.parallelism.limit / --parallelismlimit does NOT bound
      # manifest generation done by sidecar Config Management Plugins (verified:
      # set to 1, still 11 concurrent lovely renders -> OOM). It only limits native
      # (non-plugin) generation. With a CMP, the ONLY effective concurrency cap is
      # the application-controller's processors below: they gate how many apps
      # reconcile/sync at once, which is what drives concurrent GenerateManifest
      # calls into the sidecar. Keep these low so the lean repo-server can't be
      # swamped by an all-apps burst (e.g. on a repo-server restart).
      controller.status.processors: "2"
      controller.operation.processors: "2"
      reposerver.parallelism.limit: "1"
      reposerver.git.lsremote.parallelism.limit: "2"
      # Extend cache expiration for monorepo stability (default 3m)
      reposerver.revision.cache.expiration: "15m"
      # Increase manifest size limit for large monorepo directories (default 10M)
      reposerver.max.combined.directory.manifests.size: "100M"
      # Exclude non-manifest paths from CMP tar stream to reduce sidecar memory pressure
      reposerver.plugin.tar.exclusions: ".git/*;.github/*;ansible/*;node-setup/*;*.md"
      # Enable narrowed file streaming to CMP when app-level manifest-generate-paths annotations are present
      reposerver.plugin.use.manifest.generate.paths: "true"
      # Enable git globbing improvements for nested ApplicationSet patterns
      applicationsetcontroller.enable.new.git.file.globbing: "true"
      # Disable plugin path optimization for now - path resolution issues with relative paths
      # reposerver.plugin.use.manifest.generate.paths: "false"

    cmp:
      create: true
      plugins:
        argocd-vault-replacer:
          generate:
            command: [ "argocd-vault-replacer" ]
        kustomize-argocd-vault-replacer:
          generate:
            command: [ "sh", "-c" ]
            args: [ "kustomize", "build", ".", "|", "argocd-vault-replacer" ]
        helm-argocd-vault-replacer:
          init:
            command: [ "/bin/sh", "-c" ]
            args: [ "helm dependency build" ]
          generate:
            command: [ sh, -c ]
            args: [ "helm template -n $ARGOCD_APP_NAMESPACE $ARGOCD_APP_NAME . | argocd-vault-replacer" ]

  controller:
    revisionHistoryLimit: 3
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: type
              operator: NotIn
              values:
              - rpi
    resources:
      requests:
        memory: 768Mi
        cpu: 100m
      limits:
        memory: 1024Mi
        cpu: 1000m

  server:
    # Sablier discovery label — the server (UI/API) is safe to scale to zero
    # since all reconcile/auto-sync/self-heal is the application-controller
    # (a separate StatefulSet), not the server.
    deploymentLabels:
      sablier.enable: "true"
      sablier.group: argocd-server
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: type
              operator: NotIn
              values:
              - rpi

  notifications:
    enabled: false

  repoServer:
    # Single replica is plenty for a homelab now that renders are light/fast
    # (~150-420Mi, seconds each) and the Bitnami index hog is gone. Trade-off:
    # a brief render gap during pod restarts and serial cold-sync of all apps
    # (parallelism.limit=1). Bump back to 2 if HA/throughput is ever needed.
    replicas: 1
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: type
              operator: NotIn
              values:
              - rpi
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        # The repo-server main container only orchestrates git + tars files to the
        # CMP sidecar (steady-state ~90Mi); the heavy lifting is in the avp sidecar.
        # No CPU limit so git/tar streaming isn't throttled.
        memory: 512Mi
    serviceAccount:
      name: argocd-role
    env:
      # Increase timeout for Helm/Kustomize execution (default 90s)
      - name: ARGOCD_EXEC_TIMEOUT
        value: "300s"
      - name: ARGOCD_EXEC_FATAL_TIMEOUT
        value: "30s"
    extraContainers:
      - name: avp
        command: [ /var/run/argocd/argocd-cmp-server ]
        image: ghcr.io/crumbhole/lovely-vault-ver:1.2.5
        envFrom:
          - secretRef:
              name: argocd-vault-replacer-credentials
        env:
          # Bounds the lovely-plugin's own Go heap below the cgroup limit (512Mi).
          # The real peak is the helm subprocess (separate process, not governed
          # by this): now that the Bitnami classic-index dep moved to OCI, the
          # worst dep-resolution is prometheus-community (~177Mi) + template.
          # (Old 1100MiB was ABOVE the old 1Gi limit, so Go GC never engaged.)
          - name: GOMEMLIMIT
            value: "512MiB"
          - name: GOGC
            value: "50"
          - name: ARGOCD_EXEC_TIMEOUT
            value: "300s"
          - name: ARGOCD_EXEC_FATAL_TIMEOUT
            value: "30s"
          - name: ARGOCD_PLUGIN_TIMEOUT
            value: "300"
          - name: VAULT_CLIENT_TIMEOUT
            value: "300s"
        resources:
          requests:
            memory: 128Mi
            cpu: 250m
          limits:
            # Sized to controller.{status,operation}.processors=2 (the real CMP
            # concurrency cap — parallelismlimit is ineffective for sidecar plugins).
            # Measured: 2 concurrent renders peak ~509Mi (~80% of 640). Validated
            # stable (46/46 synced, 0 restarts) through a full Argo restart / Redis
            # flush burst. In-pod refs: Bitnami classic index = 541Mi, OCI pull =
            # 61Mi, heaviest helm template (kube-prometheus-stack) = ~227Mi.
            memory: 640Mi
            # No CPU limit on purpose: a 200m cap throttled helm/kustomize so
            # badly that renders hit the 300s deadline and piled up, each holding
            # its memory the whole time -> the real cause of the OOMKills. Letting
            # renders burst to finish in seconds frees memory far faster.
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
        volumeMounts:
          - mountPath: /var/run/argocd
            name: var-files
          - mountPath: /home/argocd/cmp-server/plugins
            name: plugins
          - mountPath: /tmp
            name: cmp-tmp

          # Register plugins into sidecar
          - mountPath: /home/argocd/cmp-server/config/plugin
            subPath: argocd-vault-plugin.yaml
            name: argocd-cmp-cm

    volumes:
      - name: argocd-cmp-cm
        configMap:
          name: argocd-cmp-cm
      - name: cmp-tmp
        emptyDir: {}
      - name: custom-tools
        emptyDir: {}

  applicationSet:
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: type
              operator: NotIn
              values:
              - rpi

  dex:
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: type
              operator: NotIn
              values:
              - rpi

  redis:
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: type
              operator: NotIn
              values:
              - rpi
