apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: "/argocd;/lib/shared-lib;/lib/longhorn-storage-lib"
spec:
  project: default
  source:
    repoURL: "https://github.com/Coollision/homelab-config.git"
    path: argocd
    targetRevision: master
    plugin:
      name: argocd-lovely-plugin
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # Lets Sablier scale argocd-server to 0 without selfHeal reverting it.
    # This app's syncPolicy previously had no RespectIgnoreDifferences at all
    # (unlike the workloads/system ApplicationSets), so this entry alone would
    # otherwise have no effect.
    - group: apps
      kind: Deployment
      name: argocd-server
      namespace: argocd
      jsonPointers:
        - /spec/replicas
