apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`)
      priority: 10
      middlewares:
        - name: argocd-server-sablier-dynamic
          namespace: argocd
      services:
        - name: argocd-server
          port: 80
    - kind: Rule
      match: Host(`{{.Values.ingress.host }}`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      middlewares:
        - name: argocd-server-sablier-blocking
          namespace: argocd
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
  tls: {}
