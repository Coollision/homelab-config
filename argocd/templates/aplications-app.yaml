apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: "/applications;/lib/shared-lib;/lib/longhorn-storage-lib"
spec:
  project: default
  source:
    repoURL: "https://github.com/Coollision/homelab-config.git"
    path: applications
    targetRevision: master
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
