# Complete ups.conf for the APC Back-UPS BX1600MI.
#
# The instantlinux/nut-upsd entrypoint only knows a handful of env vars
# (SERIAL/POLLONLY/POLLINTERVAL/VENDORID/SDORDER) when it generates ups.conf,
# so driver-tuning flags like onlinedischarge_calibration can't be set that way.
# But the entrypoint copies /etc/nut/local/ups.conf verbatim if it exists — so we
# mount this file there (see kustomization.yaml) and get full control.
#
# This is authoritative for driver config; the matching env vars in values.yaml
# are ignored once this file is present.

maxretry = 3
retrydelay = 5

[ups]
        driver = usbhid-ups
        port = auto
        desc = "APC Back-UPS BX1600MI"
        serial = "9B2328A03879"
        vendorid = 051d
        # BX1600MI's USB interrupt endpoint is buggy -> poll instead of relying
        # on it. pollonly disables interrupt reads; 10s interval is the
        # community-established value for this model. (NUT #2805/#2347)
        pollonly
        pollinterval = 10
        pollfreq = 30
        # APC auto-runs battery self-tests; the UPS reports "online + discharging"
        # during them. Treat that as calibration (not a real outage) and throttle
        # the otherwise-spammy log messages. (driver-recommended for BX1600MI)
        onlinedischarge_calibration
        onlinedischarge_log_throttle_sec = 30
        # BX1600MI firmware emits spurious low-battery / replace-battery blips;
        # only act on them if they persist, and apply the delay even outside
        # calibration. (NUT #2347, PR #2942/#3007)
        lbrb_log_delay_sec = 3
        lbrb_log_delay_without_calibrating
