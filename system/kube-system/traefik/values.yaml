traefik:
  fullnameOverride: traefik

  commonLabels:
    app: traefik

  rbac:
    enabled: true
  ports:
    websecure:
      tls:
        enabled: true

  ingressRoute:
    dashboard:
      enabled: true
      matchRule: Host(`traefik.<secret:kv/data/domains~local>`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      entryPoints:
        - web

  service:
    spec:
      externalTrafficPolicy: Local
      loadBalancerIP: <secret:kv/data/kube-system/traefik~ip>

  providers:
    kubernetesCRD:
      enabled: true
      allowEmptyServices: true
    kubernetesIngress:
      allowEmptyServices: true

  priorityClassName: "system-cluster-critical"
  tolerations:
  - key: "CriticalAddonsOnly"
    operator: "Exists"
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"

  experimental:
    plugins:
      sablier:
        moduleName: "github.com/sablierapp/sablier"
        version: "v1.8.0-beta.22"

  additionalArguments:
    - '--entryPoints.web.forwardedHeaders.trustedIPs=<secret:kv/data/kube-system/traefik~trusted-ips>'
    - '--entryPoints.websecure.forwardedHeaders.trustedIPs=<secret:kv/data/kube-system/traefik~trusted-ips>'

  deployment:
    replicas: 2

  metrics:
    prometheus: {}

  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 70Mi
  #   limits:
  #     cpu: 130m
  #     memory: 80Mi
