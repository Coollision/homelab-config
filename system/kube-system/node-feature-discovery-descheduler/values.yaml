node-feature-discovery:
  fullnameOverride: node-feature-discovery
  # gc:
  #   resources:
  #     requests:
  #       cpu: 5m
  #       memory: 15Mi
  #     limits:
  #       cpu: 5m
  #       memory: 25Mi
  # master:
  #   resources:
  #     requests:
  #       cpu: 50m
  #       memory: 50Mi
  #     limits:
  #       cpu: 75m
  #       memory: 75Mi

  worker:
    # resources:
    #   requests:
    #     cpu: 30m
    #     memory: 30Mi
    #   limits:
    #     cpu: 50m
    #     memory: 40Mi
    config:
      core:
        sleepInterval: 30s
        labelSources:
          - "custom"

      sources:
        custom:
          - name: "zigbee-coordinator"
            labels:
              feature.node.kubernetes.io/iot-zigbee-coordinator: "true"
            matchFeatures:
              - feature: usb.device
                matchExpressions:
                  vendor: {op: In, value: ["10c4"]}
                  device: {op: In, value: ["ea60"]}
                  serial: {op: In, value: ["54d39955bc39ec118f02e3680aac08d5"]}
          - name: "thread-border-router"
            labels:
              feature.node.kubernetes.io/iot-thread-border-router: "true"
            matchFeatures:
              - feature: usb.device
                matchExpressions:
                  vendor: {op: In, value: ["303a"]}
                  device: {op: In, value: ["831a"]}
                  serial: {op: In, value: ["E072A1FA7C7C"]}
          - name: "nut-ups-apc"
            labels:
              feature.node.kubernetes.io/nut-ups-apc: "true"
            matchFeatures:
              - feature: usb.device
                matchExpressions:
                  vendor: {op: In, value: ["051d"]}
                  device: {op: In, value: ["0002"]}
                  serial: {op: In, value: ["9B2328A03879"]}

descheduler:
  fullnameOverride: descheduler
  kind: Deployment
  deschedulingInterval: 1m
  cmdOptions:
    v: 3
  deschedulerPolicy:
    # Feed LowNodeUtilization with ACTUAL usage from metrics-server instead of the
    # default (sum of pod *requests*). Requests-based balancing was pathological here:
    # master-green sat at 94% CPU-requests from pinned/control-plane pods, so every
    # cycle the descheduler burned its eviction budget on 0-request BestEffort pods
    # that never moved the metric -> endless futile eviction loop.
    metricsProviders:
      - source: KubernetesMetrics
    maxNoOfPodsToEvictPerNode: 3
    maxNoOfPodsToEvictPerNamespace: 6
    maxNoOfPodsToEvictTotal: 10
    profiles:
      - name: mini-nodes
        pluginConfig:
          - name: "DefaultEvictor"
            args:
              evictLocalStoragePods: true
              nodeFit: true
              nodeSelector: "type=mini"
              labelSelector:
                matchExpressions:
                - key: "preventDeschedule"
                  operator: "NotIn"
                  values:
                  - "true"
          - name: "RemoveDuplicates"
          - name: "RemovePodsHavingTooManyRestarts"
            args:
              podRestartThreshold: 15
              includingInitContainers: true
          - name: "RemovePodsViolatingNodeAffinity"
            args:
              nodeAffinityType:
                - "requiredDuringSchedulingIgnoredDuringExecution"
          - name: "RemovePodsViolatingInterPodAntiAffinity"
          - name: "RemovePodsViolatingTopologySpreadConstraint"
          - name: "RemovePodsViolatingNodeTaints"
          - name: "LowNodeUtilization"
            args:
              metricsUtilization:
                source: KubernetesMetrics  # classify nodes by real CPU usage, not requests
              numberOfNodes: 1
              evictionLimits:
                node: 2
              evictableNamespaces:
                exclude:
                  - storage
              # All three dimensions on ACTUAL usage (metrics-server). A node is an
              # eviction TARGET (underutilized) only if below ALL `thresholds`, and a
              # SOURCE (overutilized) if above ANY `targetThresholds`. Tuned so the
              # steady state (master-green ~68% cpu / 80% mem / 60% pods) is
              # "appropriately utilized" -> no churn; eviction only on genuine overload.
              thresholds:
                cpu: 50
                memory: 70
                pods: 55
              targetThresholds:
                cpu: 80
                memory: 85
                pods: 80
        plugins:
          balance:
            enabled:
              - "RemoveDuplicates"
              - "RemovePodsViolatingTopologySpreadConstraint"
              - "LowNodeUtilization"
          deschedule:
            enabled:
              - "RemovePodsHavingTooManyRestarts"
              - "RemovePodsViolatingNodeTaints"
              - "RemovePodsViolatingNodeAffinity"
              - "RemovePodsViolatingInterPodAntiAffinity"
      - name: vm-nodes
        pluginConfig:
          - name: "DefaultEvictor"
            args:
              evictLocalStoragePods: true
              nodeFit: true
              nodeSelector: "type=vm"
              labelSelector:
                matchExpressions:
                - key: "preventDeschedule"
                  operator: "NotIn"
                  values:
                  - "true"
          - name: "RemoveDuplicates"
          - name: "RemovePodsHavingTooManyRestarts"
            args:
              podRestartThreshold: 15
              includingInitContainers: true
          - name: "RemovePodsViolatingNodeAffinity"
            args:
              nodeAffinityType:
                - "requiredDuringSchedulingIgnoredDuringExecution"
          - name: "RemovePodsViolatingInterPodAntiAffinity"
          - name: "RemovePodsViolatingTopologySpreadConstraint"
          - name: "RemovePodsViolatingNodeTaints"
          - name: "LowNodeUtilization"
            args:
              metricsUtilization:
                source: KubernetesMetrics  # classify nodes by real CPU usage, not requests
              numberOfNodes: 1
              evictionLimits:
                node: 2
              evictableNamespaces:
                exclude:
                  - storage
              # All three dimensions on actual usage (see mini-nodes profile).
              thresholds:
                cpu: 50
                memory: 70
                pods: 50
              targetThresholds:
                cpu: 80
                memory: 85
                pods: 80
        plugins:
          balance:
            enabled:
              - "RemoveDuplicates"
              - "RemovePodsViolatingTopologySpreadConstraint"
              - "LowNodeUtilization"
          deschedule:
            enabled:
              - "RemovePodsHavingTooManyRestarts"
              - "RemovePodsViolatingNodeTaints"
              - "RemovePodsViolatingNodeAffinity"
              - "RemovePodsViolatingInterPodAntiAffinity"
      - name: hw-enforcement
        pluginConfig:
          - name: "DefaultEvictor"
            args:
              evictLocalStoragePods: true
              nodeFit: true
              labelSelector:
                matchExpressions:
                - key: "preventDeschedule"
                  operator: "NotIn"
                  values:
                  - "true"
          - name: "RemovePodsViolatingNodeAffinity"
            args:
              nodeAffinityType:
                - "requiredDuringSchedulingIgnoredDuringExecution"
        plugins:
          deschedule:
            enabled:
              - "RemovePodsViolatingNodeAffinity"
  service:
    enabled: true
  serviceMonitor:
    enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
