node-feature-discovery:
  fullnameOverride: node-feature-discovery
  # gc:
  #   resources:
  #     requests:
  #       cpu: 5m
  #       memory: 15Mi
  #     limits:
  #       cpu: 5m
  #       memory: 25Mi
  # master:
  #   resources:
  #     requests:
  #       cpu: 50m
  #       memory: 50Mi
  #     limits:
  #       cpu: 75m
  #       memory: 75Mi

  worker:
    # resources:
    #   requests:
    #     cpu: 30m
    #     memory: 30Mi
    #   limits:
    #     cpu: 50m
    #     memory: 40Mi
    config:
      core:
        sleepInterval: 30s
        labelSources:
          - "custom"

      sources:
        custom:
          - name: "zigbee-coordinator"
            labels:
              feature.node.kubernetes.io/iot-zigbee-coordinator: "true"
            matchFeatures:
              - feature: usb.device
                matchExpressions:
                  vendor: {op: In, value: ["10c4"]}
                  device: {op: In, value: ["ea60"]}
                  serial: {op: In, value: ["54d39955bc39ec118f02e3680aac08d5"]}

descheduler:
  fullnameOverride: descheduler
  kind: Deployment
  deschedulingInterval: 1m
  cmdOptions:
    v: 3
  deschedulerPolicy:
    maxNoOfPodsToEvictPerNode: 3
    maxNoOfPodsToEvictPerNamespace: 6
    maxNoOfPodsToEvictTotal: 10
    profiles:
      - name: mini-nodes
        pluginConfig:
          - name: "DefaultEvictor"
            args:
              evictLocalStoragePods: true
              nodeFit: true
              nodeSelector: "type=mini"
              labelSelector:
                matchExpressions:
                - key: "preventDeschedule"
                  operator: "NotIn"
                  values:
                  - "true"
          - name: "RemoveDuplicates"
          - name: "RemovePodsHavingTooManyRestarts"
            args:
              podRestartThreshold: 15
              includingInitContainers: true
          - name: "RemovePodsViolatingNodeAffinity"
            args:
              nodeAffinityType:
                - "requiredDuringSchedulingIgnoredDuringExecution"
          - name: "RemovePodsViolatingInterPodAntiAffinity"
          - name: "RemovePodsViolatingTopologySpreadConstraint"
          - name: "RemovePodsViolatingNodeTaints"
          - name: "LowNodeUtilization"
            args:
              numberOfNodes: 1
              evictionLimits:
                node: 2
              evictableNamespaces:
                exclude:
                  - storage
              thresholds:
                cpu: 60
                memory: 40
                pods: 55
              targetThresholds:
                cpu: 80
                memory: 85
                pods: 80
        plugins:
          balance:
            enabled:
              - "RemoveDuplicates"
              - "RemovePodsViolatingTopologySpreadConstraint"
              - "LowNodeUtilization"
          deschedule:
            enabled:
              - "RemovePodsHavingTooManyRestarts"
              - "RemovePodsViolatingNodeTaints"
              - "RemovePodsViolatingNodeAffinity"
              - "RemovePodsViolatingInterPodAntiAffinity"
      - name: vm-nodes
        pluginConfig:
          - name: "DefaultEvictor"
            args:
              evictLocalStoragePods: true
              nodeFit: true
              nodeSelector: "type=vm"
              labelSelector:
                matchExpressions:
                - key: "preventDeschedule"
                  operator: "NotIn"
                  values:
                  - "true"
          - name: "RemoveDuplicates"
          - name: "RemovePodsHavingTooManyRestarts"
            args:
              podRestartThreshold: 15
              includingInitContainers: true
          - name: "RemovePodsViolatingNodeAffinity"
            args:
              nodeAffinityType:
                - "requiredDuringSchedulingIgnoredDuringExecution"
          - name: "RemovePodsViolatingInterPodAntiAffinity"
          - name: "RemovePodsViolatingTopologySpreadConstraint"
          - name: "RemovePodsViolatingNodeTaints"
          - name: "LowNodeUtilization"
            args:
              numberOfNodes: 1
              evictionLimits:
                node: 2
              evictableNamespaces:
                exclude:
                  - storage
              thresholds:
                cpu: 60
                memory: 25
                pods: 45
              targetThresholds:
                cpu: 75
                memory: 60
                pods: 70
        plugins:
          balance:
            enabled:
              - "RemoveDuplicates"
              - "RemovePodsViolatingTopologySpreadConstraint"
              - "LowNodeUtilization"
          deschedule:
            enabled:
              - "RemovePodsHavingTooManyRestarts"
              - "RemovePodsViolatingNodeTaints"
              - "RemovePodsViolatingNodeAffinity"
              - "RemovePodsViolatingInterPodAntiAffinity"
      - name: hw-enforcement
        pluginConfig:
          - name: "DefaultEvictor"
            args:
              evictLocalStoragePods: true
              nodeFit: true
              labelSelector:
                matchExpressions:
                - key: "preventDeschedule"
                  operator: "NotIn"
                  values:
                  - "true"
          - name: "RemovePodsViolatingNodeAffinity"
            args:
              nodeAffinityType:
                - "requiredDuringSchedulingIgnoredDuringExecution"
        plugins:
          deschedule:
            enabled:
              - "RemovePodsViolatingNodeAffinity"
  service:
    enabled: true
  serviceMonitor:
    enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
