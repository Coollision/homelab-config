traefik:
  # Resources will be named "cloudflare-tunnel-traefik"
  # Use instanceLabelOverride to distinguish this instance in labels
  instanceLabelOverride: "traefik-external"

  commonLabels:
    app: traefik-external
  rbac:
    enabled: true
  ports:
    web:
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
            priority: 10
    websecure:
      http:
        tls:
          enabled: true

  service:
    spec:
      externalTrafficPolicy: Local

  providers:
    kubernetesCRD:
      enabled: true
      ingressClass: traefik-external
      allowExternalNameServices: true
    kubernetesIngress:
      enabled: true
      allowExternalNameServices: true
      publishedService:
        enabled: false

  priorityClassName: "system-cluster-critical"
  tolerations:
    - key: "CriticalAddonsOnly"
      operator: "Exists"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"

  additionalArguments:
    - '--entryPoints.web.forwardedHeaders.trustedIPs=<secret:kv/data/kube-system/traefik~trusted-ips>'
    - '--entryPoints.websecure.forwardedHeaders.trustedIPs=<secret:kv/data/kube-system/traefik~trusted-ips>'
    - --providers.kubernetesingress.ingressclass=traefik-external
    - --serversTransport.insecureSkipVerify=true

  deployment:
    replicas: 2

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      # Avoid running external Traefik replicas on the same node
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: traefik-external
          topologyKey: kubernetes.io/hostname
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      # Prefer non-Pi nodes for better performance
      - weight: 50
        preference:
          matchExpressions:
          - key: type
            operator: NotIn
            values:
            - rpi

  metrics:
    prometheus: {}

  experimental:
    plugins:
      # Same Sablier plugin as the internal traefik (system/kube-system/traefik) —
      # needed here too so scale-to-zero works for apps using ingress_external_secure
      # (e.g. babybuddy, which exposes both an internal and external route).
      sablier:
        moduleName: "github.com/sablierapp/sablier-traefik-plugin"
        version: "v1.3.0"

