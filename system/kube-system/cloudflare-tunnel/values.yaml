traefik:
  fullnameOverride: traefik-external

  commonLabels: 
    app: traefik-external
  rbac:
    enabled: true
  ports:
    web:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
          priority: 10
    websecure:
      tls:
        enabled: true

  service:
    spec:
      externalTrafficPolicy: Local
      
  ssl:
    insecureSkipVerify: true

  providers:
    kubernetesCRD:
      enabled: true
      ingressClass: traefik-external
      allowExternalNameServices: true
      allowEmptyServices: true
    kubernetesIngress:
      enabled: true
      ingressClass: traefik-external
      allowExternalNameServices: true
      allowEmptyServices: true

  priorityClassName: "system-cluster-critical"
  tolerations:
    - key: "CriticalAddonsOnly"
      operator: "Exists"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
  
  experimental:
    plugins:
      sablier:
        moduleName: "github.com/sablierapp/sablier"
        version: "v1.8.0-beta.22"

  additionalArguments:
    - '--entryPoints.web.forwardedHeaders.trustedIPs=<secret:kv/data/kube-system/traefik~trusted-ips>'
    - '--entryPoints.websecure.forwardedHeaders.trustedIPs=<secret:kv/data/kube-system/traefik~trusted-ips>'
    - --providers.kubernetesingress.ingressclass=traefik-external

  deployment:
    replicas: 2

  metrics:
    prometheus: {}

  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 70Mi
  #   limits:
  #     cpu: 130m
  #     memory: 80Mi