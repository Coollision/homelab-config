{{- if .Values.unsealer.enabled }}
# In-cluster auto-unsealer: Vault keeps its shamir seal (no seal migration);
# this CronJob submits unseal keys from a manually-created Secret whenever it
# finds Vault sealed. The Secret is intentionally NOT in git — create it once:
#
#   kubectl create secret generic vault-unseal-keys -n secrets \
#     --from-literal=VAULT_UNSEAL_KEY_1=... \
#     --from-literal=VAULT_UNSEAL_KEY_2=... \
#     --from-literal=VAULT_UNSEAL_KEY_3=...
#
# Any env var named VAULT_UNSEAL_KEY_* is submitted; provide at least the
# unseal threshold (3 of 5).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-unsealer
  labels:
    app.kubernetes.io/name: vault-unsealer
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  schedule: {{ .Values.unsealer.schedule | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      # Auto-clean finished jobs so a transient failure (vault pod restarting)
      # doesn't leave a stale Job object keeping KubeJobFailed firing forever.
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: vault-unsealer
        spec:
          restartPolicy: Never
          containers:
            - name: unseal
              image: "{{ .Values.unsealer.image.repository }}:{{ .Values.unsealer.image.tag }}"
              command:
                - /bin/sh
                - -c
                - |
                  vault status >/dev/null 2>&1
                  rc=$?
                  if [ "$rc" -eq 0 ]; then
                    echo "vault is unsealed - nothing to do"
                    exit 0
                  elif [ "$rc" -ne 2 ]; then
                    echo "vault unreachable (vault status rc=$rc)"
                    exit 1
                  fi
                  echo "vault is sealed - submitting unseal keys"
                  for var in $(env | grep -o '^VAULT_UNSEAL_KEY_[A-Za-z0-9_]*'); do
                    eval "key=\$$var"
                    vault operator unseal "$key" >/dev/null || exit 1
                  done
                  vault status >/dev/null 2>&1 || { echo "still sealed after submitting keys"; exit 1; }
                  echo "vault unsealed successfully"
              env:
                - name: VAULT_ADDR
                  value: "http://vault.{{ .Release.Namespace }}.svc:8200"
                - name: HOME
                  value: /tmp
              envFrom:
                - secretRef:
                    name: {{ .Values.unsealer.secretName }}
              resources:
                requests:
                  cpu: 5m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 100
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
{{- end }}
