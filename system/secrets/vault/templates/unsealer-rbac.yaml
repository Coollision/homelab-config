{{- /*
RBAC for the in-pod auto-unseal sidecar. Grants the Vault pod's ServiceAccount
GET on ONLY the `vault-unseal-keys` Secret (by name). The sidecar fetches the
keys from the API on demand at unseal time and drops them — they are never
mounted into the container nor held in its environment. The SA token is the only
standing credential; this Role is the tightest scope that still lets it unseal.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-unsealer
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-unseal-keys"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-unsealer
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-unsealer
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: {{ .Release.Namespace }}
