fullnameOverride: "vault"

# In-cluster auto-unseal: CronJob submits shamir keys from the manually-created
# `vault-unseal-keys` Secret (never in git) whenever Vault is sealed.
unsealer:
  enabled: true
  schedule: "*/2 * * * *"
  secretName: vault-unseal-keys
  image:
    repository: hashicorp/vault
    tag: "2.0.3"

storage:
  - nameSuffix: data
    size: 128Mi
    type: longhorn
    volumeName: vault-data
    storageClass: longhorn
    accessModes:
      - ReadWriteOnce
    protect: true

vault:
  server:
    readinessProbe:
      timeoutSeconds: 10
    extraLabels:
      preventDeschedule: "true"
    dataStorage:
      enabled: false
      mountPath: "/vault/data"
    volumes:
      - name: data
        persistentVolumeClaim:
          claimName: vault-data
    volumeMounts:
      - name: data
        mountPath: "/vault/data"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: type
              operator: NotIn
              values:
              - rpi
  # serviceAccount:
  #   createSecret: true
  ui:
    enabled: true

ingress_internal:
  host: vault.<secret:kv/data/domains~local>
