fullnameOverride: "vault"

storage:
  - nameSuffix: data
    size: 128Mi
    type: longhorn
    volumeName: vault-data
    storageClass: longhorn
    accessModes:
      - ReadWriteOnce
    protect: true

vault:
  server:
    readinessProbe:
      timeoutSeconds: 10
    extraLabels:
      preventDeschedule: "true"
    # In-cluster auto-unseal sidecar. Vault keeps its shamir seal (no seal
    # migration); this sidecar shares the pod, watches the local Vault, and
    # submits the shamir keys the moment it comes up sealed (e.g. after a pod
    # restart). Reacts within seconds, no external CronJob polling.
    #
    # Keys come from a manually-created Secret that is NEVER in git. Create once:
    #   kubectl create secret generic vault-unseal-keys -n secrets \
    #     --from-literal=VAULT_UNSEAL_KEY_1=... \
    #     --from-literal=VAULT_UNSEAL_KEY_2=... \
    #     --from-literal=VAULT_UNSEAL_KEY_3=...   # threshold is 3 of 5
    #
    # NOTE: keys are injected with explicit `valueFrom`, NOT `envFrom`. In this
    # namespace Kubernetes service-link env vars for the `vault`/`vaultwarden`
    # services pollute the VAULT_* space and clobber envFrom-derived values;
    # explicit env entries take precedence and are read reliably.
    extraContainers:
      - name: unsealer
        image: hashicorp/vault:2.0.3
        command:
          - /bin/sh
          - -c
          - |
            export VAULT_ADDR=http://127.0.0.1:8200
            echo "unsealer: watching local vault"
            while true; do
              vault status >/dev/null 2>&1
              rc=$?
              if [ "$rc" -eq 0 ]; then
                sleep 30                       # unsealed: idle check
              elif [ "$rc" -eq 2 ]; then
                echo "unsealer: vault sealed, submitting keys"
                for k in "$VAULT_UNSEAL_KEY_1" "$VAULT_UNSEAL_KEY_2" "$VAULT_UNSEAL_KEY_3"; do
                  [ -n "$k" ] && vault operator unseal "$k" >/dev/null 2>&1
                done
                sleep 5
              else
                sleep 3                        # vault not up yet
              fi
            done
        env:
          - name: VAULT_UNSEAL_KEY_1
            valueFrom:
              secretKeyRef:
                name: vault-unseal-keys
                key: VAULT_UNSEAL_KEY_1
          - name: VAULT_UNSEAL_KEY_2
            valueFrom:
              secretKeyRef:
                name: vault-unseal-keys
                key: VAULT_UNSEAL_KEY_2
          - name: VAULT_UNSEAL_KEY_3
            valueFrom:
              secretKeyRef:
                name: vault-unseal-keys
                key: VAULT_UNSEAL_KEY_3
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
    dataStorage:
      enabled: false
      mountPath: "/vault/data"
    volumes:
      - name: data
        persistentVolumeClaim:
          claimName: vault-data
    volumeMounts:
      - name: data
        mountPath: "/vault/data"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: type
              operator: NotIn
              values:
              - rpi
  # serviceAccount:
  #   createSecret: true
  ui:
    enabled: true

ingress_internal:
  host: vault.<secret:kv/data/domains~local>
