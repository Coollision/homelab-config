fullnameOverride: "vault"

storage:
  - nameSuffix: data
    size: 128Mi
    type: longhorn
    volumeName: vault-data
    storageClass: longhorn
    accessModes:
      - ReadWriteOnce
    protect: true

vault:
  server:
    readinessProbe:
      timeoutSeconds: 10
    extraLabels:
      preventDeschedule: "true"
    # In-pod auto-unseal sidecar. Vault keeps its shamir seal (no seal
    # migration); this sidecar shares the pod, watches the local Vault, and when
    # it finds Vault sealed it fetches the shamir keys ON DEMAND from the K8s
    # API, submits them, and drops them. Keys are NEVER mounted into the sidecar
    # nor held in its environment — the only standing credential is the pod's SA
    # token, scoped by RBAC (see unsealer-rbac.yaml) to GET the one Secret.
    # Plaintext keys exist only in shell memory for the moment of an unseal.
    #
    # Keys live in a manually-created Secret that is NEVER in git. Create once:
    #   kubectl create secret generic vault-unseal-keys -n secrets \
    #     --from-literal=VAULT_UNSEAL_KEY_1=... \
    #     --from-literal=VAULT_UNSEAL_KEY_2=... \
    #     --from-literal=VAULT_UNSEAL_KEY_3=...   # threshold is 3 of 5
    #
    # Uses curl (not the vault binary) so it can verify the K8s API server cert
    # with the projected CA; both Vault (localhost) and unseal use the HTTP API.
    extraContainers:
      - name: unsealer
        image: curlimages/curl:8.21.0
        command:
          - /bin/sh
          - -c
          - |
            VADDR=http://127.0.0.1:8200
            KAPI=https://kubernetes.default.svc
            SA=/var/run/secrets/kubernetes.io/serviceaccount
            NS=$(cat "$SA/namespace")
            echo "unsealer: watching local vault (on-demand key fetch, no resident creds)"
            while true; do
              sealed=$(curl -s --max-time 5 "$VADDR/v1/sys/seal-status" | sed -n 's/.*"sealed":\([a-z]*\).*/\1/p')
              if [ "$sealed" = "false" ]; then
                sleep 30                         # unsealed: idle check
              elif [ "$sealed" = "true" ]; then
                echo "unsealer: vault sealed, fetching keys"
                token=$(cat "$SA/token")
                json=$(curl -s --max-time 5 --cacert "$SA/ca.crt" -H "Authorization: Bearer $token" \
                  "$KAPI/api/v1/namespaces/$NS/secrets/vault-unseal-keys")
                for n in 1 2 3; do
                  # tolerate both compact ("k":"v") and pretty ("k": "v") API JSON
                  key=$(printf '%s' "$json" | grep -o "\"VAULT_UNSEAL_KEY_$n\": *\"[^\"]*\"" | head -1 | sed 's/.*: *"//;s/"$//' | base64 -d)
                  [ -n "$key" ] && curl -s --max-time 5 --request PUT --data "{\"key\":\"$key\"}" "$VADDR/v1/sys/unseal" >/dev/null
                done
                unset json token key
                sleep 5
              else
                sleep 3                          # vault not reachable yet
              fi
            done
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 100
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
    dataStorage:
      enabled: false
      mountPath: "/vault/data"
    volumes:
      - name: data
        persistentVolumeClaim:
          claimName: vault-data
    volumeMounts:
      - name: data
        mountPath: "/vault/data"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: type
              operator: NotIn
              values:
              - rpi
  # serviceAccount:
  #   createSecret: true
  ui:
    enabled: true

ingress_internal:
  host: vault.<secret:kv/data/domains~local>
