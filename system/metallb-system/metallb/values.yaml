metallb:
  fullnameOverride: metallb
  frrk8s:
    enabled: false
  frr-k8s:
    prometheus:
      serviceMonitor:
        enabled: false
  controller:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  speaker:
    frr:
      enabled: false
    livenessProbe:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 3
      successThreshold: 1
      failureThreshold: 5
    readinessProbe:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 3
      successThreshold: 1
      failureThreshold: 5
    resources:
      requests:
        cpu: 50m
        memory: 48Mi
      limits:
        memory: 128Mi
