useTraefikIngressRoutes: true
speedtestExporter:
  enabled: true
  scrapeInterval: 5m
armexporter:
  enabled: true
promstack:
  kubeControllerManager:
    endpoints:
      - <secret:kv/data/config/master~ip-0>
      # - <secret:kv/data/config/master~ip-1>
      # - <secret:kv/data/config/master~ip-2>
    enabled: true
    service:
      enabled: true
      port: 10257
      targetPort: 10257
    serviceMonitor:
      enabled: true
      https: true
      insecureSkipVerify: true
      metricRelabelings: &drop-highcard-buckets
        - sourceLabels: [__name__]
          regex: "apiserver_request_duration_seconds_bucket|apiserver_request_sli_duration_seconds_bucket|etcd_request_duration_seconds_bucket|apiserver_request_body_size_bytes_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_response_sizes_bucket|apiserver_watch_cache_read_wait_seconds_bucket|apiserver_watch_events_sizes_bucket|apiserver_admission_controller_admission_duration_seconds_bucket|apiserver_flowcontrol_request_execution_seconds_bucket|storage_operation_duration_seconds_bucket|workqueue_queue_duration_seconds_bucket|workqueue_work_duration_seconds_bucket"
          action: drop
  kubeScheduler:
    endpoints:
      - <secret:kv/data/config/master~ip-0>
      # - <secret:kv/data/config/master~ip-1>
      # - <secret:kv/data/config/master~ip-2>
    enabled: true
    service:
      enabled: true
      port: 10259
      targetPort: 10259
    serviceMonitor:
      enabled: true
      https: true
      insecureSkipVerify: true
      metricRelabelings: *drop-highcard-buckets
  kubeProxy:
    endpoints:
      - <secret:kv/data/config/master~ip-0>
      # - <secret:kv/data/config/master~ip-1>
      # - <secret:kv/data/config/master~ip-2>
    enabled: true
    service:
      enabled: true
      port: 10249
      targetPort: 10249
    serviceMonitor:
      metricRelabelings: *drop-highcard-buckets
  kubeApiServer:
    serviceMonitor:
      metricRelabelings: *drop-highcard-buckets
  alertmanager:
    alertmanagerSpec:
      externalUrl: http://alertmanager.<secret:kv/data/domains~local>/
      storage:
        volumeClaimTemplate:
          metadata:
            name: monitoring-alertmanager
          spec:
            storageClassName: longhorn
            volumeName: monitoring-alertmanager
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi
  # resources:
  #   limits:
  #     cpu: 60m
  #     memory: 30Mi
  #   requests:
  #     cpu: 50m
  #     memory: 20Mi
  prometheus:
    prometheusSpec:
      externalUrl: http://prometheus.<secret:kv/data/domains~local>/
      retention: 120d
      retentionSize: 9GB
      enableAdminAPI: true
      scrapeInterval: 30s
      additionalArgs:
        - name: "storage.tsdb.max-block-duration"
          value: "2h"
        # Reduce query.max-samples from default 50M to 10M for homelab stability 
        # and memory efficiency. 10M still allows complex queries across 120d data.
        - name: "query.max-samples"
          value: "10000000"
        # Limit concurrent queries to prevent memory spikes under load
        - name: "query.max-concurrency"
          value: "150"
        # Enable native histogram support for efficient storage of distributions
        - name: "enable-feature"
          value: "native-histograms"
      # Prometheus-operator managed WAL compression option (instead of CLI arg)
      walCompression: true
      livenessProbe:
        initialDelaySeconds: 30
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 6
      readinessProbe:
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 10
        failureThreshold: 3
      resources:
        requests:
          cpu: 300m
          memory: 2Gi
        limits:
          cpu: 1500m
          memory: 3Gi
      storageSpec:
        volumeClaimTemplate:
          metadata:
            name: monitoring-prometheus
          spec:
            storageClassName: longhorn
            volumeName: monitoring-prometheus
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels: null
      additionalScrapeConfigs:
        - job_name: kubernetes-pod-endpoints
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - action: keep
              regex: true
              source_labels:
                - __meta_kubernetes_pod_annotation_prometheus_io_scrape
            - action: keep
              regex: true
              source_labels:
                - __meta_kubernetes_pod_annotationpresent_prometheus_io_port
            - action: drop
              regex: (kube-system|prom)
              source_labels:
                - __meta_kubernetes_namespace
            - action: replace
              regex: (https?)
              source_labels:
                - __meta_kubernetes_pod_annotation_prometheus_io_scheme
              target_label: __scheme__
            - action: replace
              regex: (.+)
              source_labels:
                - __meta_kubernetes_pod_annotation_prometheus_io_path
              target_label: __metrics_path__
            - action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              source_labels:
                - __address__
                - __meta_kubernetes_pod_annotation_prometheus_io_port
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - action: replace
              source_labels:
                - __meta_kubernetes_namespace
              target_label: kubernetes_namespace
            - action: replace
              source_labels:
                - __meta_kubernetes_service_name
              target_label: kubernetes_name
          # Drop Go runtime and process metrics from auto-discovered targets.
          # These are emitted by every Go binary (Traefik, exporters, …) and are
          # not useful for homelab dashboards.
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: "go_.*|process_.*"
              action: drop
        - job_name: kubernetes-service-endpoints
          kubernetes_sd_configs:
            - role: service
          relabel_configs:
            - action: keep
              regex: true
              source_labels:
                - __meta_kubernetes_service_annotation_prometheus_io_scrape
            - action: drop
              regex: (kube-system|prom)
              source_labels:
                - __meta_kubernetes_namespace
            - action: keep
              regex: .*metrics
              source_labels:
                - __meta_kubernetes_service_port_name
            - action: replace
              regex: (https?)
              source_labels:
                - __meta_kubernetes_service_annotation_prometheus_io_scheme
              target_label: __scheme__
            - action: replace
              regex: (.+)
              source_labels:
                - __meta_kubernetes_service_annotation_prometheus_io_path
              target_label: __metrics_path__
            - action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              source_labels:
                - __address__
                - __meta_kubernetes_service_annotation_prometheus_io_port
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_service_label_(.+)
            - action: replace
              source_labels:
                - __meta_kubernetes_namespace
              target_label: kubernetes_namespace
            - action: replace
              source_labels:
                - __meta_kubernetes_service_name
              target_label: kubernetes_name
          # Drop Go runtime and process metrics from auto-discovered service targets.
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: "go_.*|process_.*"
              action: drop
  grafana:
    externalUrl: http://grafana.<secret:kv/data/domains~local>/
    adminPassword: <secret:kv/data/monitoring/grafana~adminPassword>
    deploymentStrategy:
      type: Recreate
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    sidecar:
      dashboards:
        provider:
          allowUiUpdates: true
    persistence:
      enabled: true
      storageClassName: longhorn
      volumeName: monitoring-grafana
      accessModes:
        - ReadWriteOnce
      size: 2Gi
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://logging-loki-gateway:80
        editable: false
        isDefault: false
        jsonData:
          httpHeaderName1: X-Scope-OrgID
        secureJsonData:
          httpHeaderValue1: 1
  # ── Node-exporter metric dropping ────────────────────────────────────────
  # prometheus-node-exporter is already configured above (relabelings that set
  # the instance label from the Kubernetes node name). We extend it here with
  # metricRelabelings to drop metrics that are not useful in homelab dashboards.
  # ── kube-state-metrics metric filtering ──────────────────────────────────
  # kube-state-metrics emits exhaustive Kubernetes object metadata (~3000+ metrics).
  # Most homelab setups only need a small subset for dashboards. Drop verbose metrics.
  # These metrics have high cardinality due to pod labels, and generated data we don't use.
  prometheus-kube-state-metrics:
    # Restrict labels exposed in metrics to only those we use in dashboards.
    # This dramatically reduces cardinality while keeping metrics queryable.
    # pod_labels are excluded entirely by omitting them from the allowlist.
    metricLabelsAllowlist:
      - "pods=[*]"
      - "deployments=[*]"
      - "statefulsets=[*]"
      - "daemonsets=[*]"
      - "services=[*]"
      - "nodes=[*]"
    prometheus:
      monitor:
        metricRelabelings:
          # Drop rarely-used pod/container metadata metrics
          - sourceLabels: [__name__]
            regex: "kube_pod_labels|kube_pod_status_phase_reason|kube_pod_status_reason|kube_pod_status_scheduled_time|kube_container_status_last_terminated_reason|kube_container_status_terminated_reason"
            action: drop
          # Drop per-pod resource limits we don't dashboard (use requests instead)
          - sourceLabels: [__name__]
            regex: "kube_pod_container_resource_limits"
            action: drop
          # Don't need individual pod parent object references
          - sourceLabels: [__name__]
            regex: "kube_pod_owner"
            action: drop
          # Drop verbose replicaset metrics we don't use
          - sourceLabels: [__name__]
            regex: "kube_replicaset.*|kube_statefulset_status_replicas.*"
            action: drop
  
  prometheus-node-exporter:
    prometheus:
      monitor:
        relabelings:
          - action: replace
            regex: (.*)
            replacement: $1
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: instance
        metricRelabelings:
          # node_scrape_collector_* are internal node_exporter meta-metrics about
          # how long each of its own collectors took to run. Not useful for node
          # monitoring itself.
          - sourceLabels: [__name__]
            regex: "node_scrape_collector_duration_seconds|node_scrape_collector_success"
            action: drop
          # Go runtime and process metrics of the node_exporter binary itself.
          - sourceLabels: [__name__]
            regex: "go_.*|process_.*"
            action: drop
  
  # ── kubelet / cAdvisor filtering ────────────────────────────────────────────
  # Keep a single kubelet block. The plain kubelet endpoint (/metrics) gets a
  # conservative bucket reduction, while cAdvisor gets the broader container
  # noise filtering.
  kubelet:
    serviceMonitor:
      metricRelabelings:
        # Reduce bucket cardinality of kubelet storage operations.
        - sourceLabels: [__name__, le]
          regex: "(csi_operations|storage_operation_duration)_seconds_bucket;(0.25|2.5|15|25|120|600)(\\.0)?"
          action: drop
      cAdvisorMetricRelabelings:
        # Drop less useful container CPU metrics.
        - sourceLabels: [__name__]
          regex: 'container_cpu_(cfs_throttled_seconds_total|load_average_10s|system_seconds_total|user_seconds_total)'
          action: drop
        # Drop less useful / always zero filesystem metrics.
        - sourceLabels: [__name__]
          regex: 'container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)'
          action: drop
        # Drop less useful / always zero container memory metrics.
        - sourceLabels: [__name__]
          regex: 'container_memory_(mapped_file|swap)'
          action: drop
        # Drop less useful container process metrics.
        - sourceLabels: [__name__]
          regex: 'container_(file_descriptors|tasks_state|threads_max)'
          action: drop
        # Drop container_memory_failures_total{scope="hierarchy"} metrics,
        # we only need the container scope.
        - sourceLabels: [__name__, scope]
          regex: 'container_memory_failures_total;hierarchy'
          action: drop
        # Drop container network metrics for noisy virtual interfaces.
        - sourceLabels: [__name__, interface]
          regex: 'container_network_.*;(cali|cilium|cni|lxc|nodelocaldns|tunl).*'
          action: drop
        # Drop container spec metrics that overlap with kube-state-metrics.
        - sourceLabels: [__name__]
          regex: 'container_spec.*'
          action: drop
        # Drop cgroup metrics with no pod.
        - sourceLabels: [id, pod]
          regex: '.+;'
          action: drop
        # Drop verbose TCP/UDP connection metrics (one per container per connection type).
        - sourceLabels: [__name__]
          regex: "container_network_tcp.*|container_network_udp.*"
          action: drop
        # Drop filesystem details we don't dashboard.
        - sourceLabels: [__name__]
          regex: "container_fs_usage_bytes|container_fs_limits_bytes"
          action: drop
        # Drop advanced metrics (perf counters, etc.).
        - sourceLabels: [__name__]
          regex: "container_perf.*|container_last_seen|container_last_recorded.*|container_start_time_seconds"
          action: drop
  nameOverride: promstack
  cleanPrometheusOperatorObjectNames: true
  defaultRules:
    rules:
      etcd: false
  kubeEtcd:
    enabled: false

storage:
  - nameSuffix: alertmanager
    mountPath: /data/alertmanager
    storagePath: alertmanager-alertmanager-monitoring-promstack-0
    volumeName: monitoring-alertmanager
    size: "2Gi"
    type: longhorn
    accessMode: ReadWriteOnce
  - nameSuffix: prometheus
    mountPath: /data/prometheus
    storagePath: prometheus-prometheus-monitoring-promstack-0
    volumeName: monitoring-prometheus
    size: "20Gi"
    type: longhorn
    accessMode: ReadWriteOnce
  - nameSuffix: grafana
    mountPath: /var/lib/grafana
    storagePath: grafana
    volumeName: monitoring-grafana
    size: "2Gi"
    type: longhorn
    accessMode: ReadWriteOnce

storageConfig:
  prefix: "monitoring"
  claimNamespace: "monitoring"
  # longhornNamespace: "storage"  # default, override if needed
