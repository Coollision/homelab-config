{{- /* Auto-publish every alert YAML in grafana-alerts/ as a Grafana sidecar ConfigMap. */ -}}
{{- $kubeTargetVersion := default .Capabilities.KubeVersion.GitVersion .Values.kubeTargetVersionOverride }}
{{- if and (or .Values.promstack.grafana.enabled .Values.promstack.grafana.forceDeployDashboards) (semverCompare ">=1.14.0-0" $kubeTargetVersion) (semverCompare "<9.9.9-9" $kubeTargetVersion) .Values.promstack.grafana.sidecar.alerts.enabled }}
{{- range $path, $_ := .Files.Glob "grafana-alerts/*.yaml" }}
{{- $base := base $path }}
{{- $name := trimSuffix ".yaml" $base }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ $.Release.Namespace }}
  name: {{ printf "%s-%s-alert" (include "kube-prometheus-stack.fullname" $) $name | trunc 63 | trimSuffix "-" }}
  labels:
    grafana_alert: "1"
    app: {{ template "kube-prometheus-stack.name" $ }}-grafana
{{ include "kube-prometheus-stack.labels" $ | indent 4 }}
data:
  {{ $base }}: |-
    {{- $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end -}}
