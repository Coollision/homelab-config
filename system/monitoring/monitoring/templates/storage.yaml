{{- $first := true }}
{{- range .Values.storage }}
{{- if not $first }}
---
{{- end }}
{{- $first = false }}
# Longhorn Volume CR
apiVersion: longhorn.io/v1beta2
kind: Volume
metadata:
  name: monitoring-{{ .nameSuffix }}
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-options: Delete=false,Prune=false
  labels:
    backup-type: "{{ .backupType | default "daily" }}"
    protect: "{{ .protect | default "true" }}"
{{- if .recurringJobs }}
{{- range .recurringJobs }}
    "recurring-job.longhorn.io/{{ . }}": "enabled"
{{- end }}
{{- end }}
spec:
  accessMode: "{{- if eq .accessMode "ReadWriteOnce" -}}rwo{{- else if eq .accessMode "ReadWriteMany" -}}rwx{{- else if eq .accessMode "ReadWriteOncePod" -}}rwop{{- else -}}{{ .accessMode | default "rwo" }}{{- end }}"
  dataEngine: "v1"
  dataLocality: "best-effort"
  frontend: "blockdev"
  numberOfReplicas: 2
  size: "{{- if hasSuffix "Ti" .size -}}{{ trimSuffix "Ti" .size | float64 | mulf 1099511627776.0 | printf "%.0f" }}{{- else if hasSuffix "Gi" .size -}}{{ trimSuffix "Gi" .size | float64 | mulf 1073741824.0 | printf "%.0f" }}{{- else if hasSuffix "Mi" .size -}}{{ trimSuffix "Mi" .size | float64 | mulf 1048576.0 | printf "%.0f" }}{{- else -}}{{ .size }}{{- end }}"
  diskSelector: []
  nodeSelector: []
  replicaAutoBalance: "ignored"
  revisionCounterDisabled: true
  snapshotDataIntegrity: "ignored"
  Standby: false
  migratable: false
---
# Kubernetes PersistentVolume
apiVersion: v1
kind: PersistentVolume
metadata:
  name: monitoring-{{ .nameSuffix }}
spec:
  capacity:
    storage: {{ .size }}
    # PV size now matches PVC request
  accessModes:
    - {{ .accessMode | default "ReadWriteOnce" }}
  storageClassName: longhorn
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: driver.longhorn.io
    volumeHandle: monitoring-{{ .nameSuffix }}
    fsType: ext4
{{- end }}