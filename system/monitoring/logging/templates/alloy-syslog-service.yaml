apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-promtail-syslog" .Release.Name | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name (.Chart.Version | replace "+" "_") | trunc 63 | trimSuffix "-" }}
spec:
  type: LoadBalancer
  loadBalancerIP: {{ .Values.syslogService.loadBalancerIP }}
  externalTrafficPolicy: {{ .Values.syslogService.externalTrafficPolicy }}
  selector:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: syno-syslog
      port: {{ .Values.alloy.syslogPorts.synologyTcp }}
      protocol: TCP
      targetPort: {{ .Values.alloy.syslogPorts.synologyTcp }}
    - name: unifi-syslog
      port: {{ .Values.alloy.syslogPorts.unifiUdp }}
      protocol: UDP
      targetPort: {{ .Values.alloy.syslogPorts.unifiUdp }}