promtail:
  serviceMonitor:
    enabled: true
    labels:
      release: monitoring
  config:
    logLevel: info
    serverPort: 3101
    clients:
      - url: http://logging-loki:3100/loki/api/v1/push
        tenant_id: 1

    snippets:
      extraScrapeConfigs: |
        # Add an additional scrape config for syslog
        - job_name: syslog
          syslog:
            listen_address: 0.0.0.0:{{ .Values.extraPorts.syslog.containerPort }}
            idle_timeout: 60s
            use_incoming_timestamp: yes
            label_structured_data: yes
            labels:
              job: syslog
          relabel_configs:
            - source_labels:
                - __syslog_message_hostname
              target_label: hostname

            # example label values: kernel, CRON, kubelet
            - source_labels:
                - __syslog_message_app_name
              target_label: app

            # example label values: debug, notice, informational, warning, error
            - source_labels:
                - __syslog_message_severity
              target_label: level

        # Add an additional scrape config for syslog
        - job_name: journal
          journal:
            path: /var/log/journal
            max_age: 12h
            labels:
              job: systemd-journal
          relabel_configs:
            - source_labels:
                - __journal__hostname
              target_label: hostname

            # example label values: kubelet.service, containerd.service
            - source_labels:
                - __journal__systemd_unit
              target_label: unit

            # example label values: debug, notice, info, warning, error
            - source_labels:
                - __journal_priority_keyword
              target_label: level

    # Mount journal directory and machine-id file into promtail pods
  extraVolumes:
    - name: journal
      hostPath:
        path: /var/log/journal
    - name: machine-id
      hostPath:
        path: /etc/machine-id

  extraVolumeMounts:
    - name: journal
      mountPath: /var/log/journal
      readOnly: true
    - name: machine-id
      mountPath: /etc/machine-id
      readOnly: true
  extraPorts:
    # Add a port for syslog
    syslog:
      name: tcp-syslog
      containerPort: 1514
      service:
        port: 80
        type: LoadBalancer
        externalTrafficPolicy: Local
        loadBalancerIP: <secret:kv/data/monitoring/logging~syslog_ip>

loki:
  deploymentMode: SingleBinary
  loki:
    storage:
      type: filesystem
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin
    commonConfig:
      replication_factor: 1
    compactor:
      retention_enabled: true
      delete_request_store: filesystem
      compaction_interval: 1h
    limits_config:
      retention_period: 90d
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      max_query_lookback: 90d
      split_queries_by_interval: 24h
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      per_stream_rate_limit: 3MB
      per_stream_rate_limit_burst: 15MB
    schemaConfig:
      configs:
      - from: "2024-01-01"
        store: tsdb
        index:
          prefix: loki_index_
          period: 24h
        object_store: filesystem # we're storing on filesystem so there's no real persistence here.
        schema: v13
    podSecurityContext:
      fsGroup: 10001
      fsGroupChangePolicy: Always  # Always fix ownership on mount, not just on mismatch
      runAsGroup: 10001
      runAsNonRoot: true
      runAsUser: 10001
  singleBinary:
    replicas: 1
    persistence:
      storageClass: longhorn
      size: 10Gi
      volumeName: monitoring-loki
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  read:
    replicas: 0
  backend:
    replicas: 0
  write:
    replicas: 0
  monitoring:
    serviceMonitor:
      enabled: true
      labels:
        release: monitoring
      interval: 30s
      metricRelabelings:
        # Drop high-cardinality gRPC message size histograms — not useful for homelab dashboards
        - sourceLabels: [__name__]
          regex: loki_(request_message_bytes|response_message_bytes)_bucket
          action: drop
        # Drop internal cache/kv/memcache latency histograms — internals not worth storing
        - sourceLabels: [__name__]
          regex: loki_(memcache_request_duration_seconds|kv_request_duration_seconds|cache_value_size_bytes|cache_request_duration_seconds)_bucket
          action: drop
        # Drop Go runtime GC/scheduler histograms — too many buckets, not actionable
        - sourceLabels: [__name__]
          regex: go_(gc_heap_(allocs|frees)_by_size_bytes|sched_(pauses|latencies)|gc_pauses).*_bucket
          action: drop

# Reduce memcached cache sizes from defaults (8192MB/1024MB) — homelab doesn't need production sizing
chunksCache:
  allocatedMemory: 256

resultsCache:
  allocatedMemory: 128

# Disable synthetic canary probes — not useful for homelab, saves ~3 pods
lokiCanary:
  enabled: false

# Reduce gateway noise
gateway:
  verboseLogging: false

storage:
  - nameSuffix: loki
    pvcName: storage-logging-loki-0
    mountPath: /var/loki
    storagePath: loki
    volumeName: monitoring-loki
    size: "10Gi"
    type: longhorn
    accessMode: ReadWriteOnce

storageConfig:
  prefix: "monitoring"
  claimNamespace: "monitoring"
  # longhornNamespace: "storage"  # default, override if needed
