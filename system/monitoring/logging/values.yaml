alloy:
  syslogPorts:
    synologyTcp: 10514 # Change this value to adjust the Synology syslog listener
    unifiUdp: 10555 # Change this value to adjust the Unifi syslog listener
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: monitoring
  service:
    enabled: true
    type: ClusterIP
  controller:
    type: daemonset
    tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
    volumes:
      extra:
        - name: journal
          hostPath:
            path: /var/log/journal
        - name: machine-id
          hostPath:
            path: /etc/machine-id
  alloy:
    listenPort: 3101
    extraEnv:
      - name: HOST_NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
    extraPorts:
      - name: syno-syslog
        port: 10514
        targetPort: 10514
        protocol: TCP
      - name: unifi-syslog
        port: 10555
        targetPort: 10555
        protocol: UDP
    mounts:
      extra:
        - name: journal
          mountPath: /var/log/journal
          readOnly: true
        - name: machine-id
          mountPath: /etc/machine-id
          readOnly: true
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    configMap:
      content: |
        logging {
          level  = "info"
          format = "logfmt"
        }

        loki.write "default" {
          endpoint {
            url       = "http://logging-loki:3100/loki/api/v1/push"
            tenant_id = "1"
          }
        }

        discovery.kubernetes "pods" {
          role = "pod"

          selectors {
            role  = "pod"
            field = "spec.nodeName=" + sys.env("HOST_NODE_NAME")
          }
        }

        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_container_init"]
            regex         = "true"
            action        = "drop"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            regex         = "Pending|Succeeded|Failed|Unknown"
            action        = "drop"
          }

          rule {
            target_label = "job"
            replacement  = "kubernetes-pods"
          }

          rule {
            target_label = "source"
            replacement  = "kubernetes"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "hostname"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app"]
            target_label  = "app"
            regex         = "(.+)"
          }
        }

        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pods.output
          forward_to = [loki.write.default.receiver]
        }

        loki.relabel "journal_rules" {
          forward_to = []

          rule {
            source_labels = ["__journal__hostname"]
            target_label  = "hostname"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__journal__systemd_unit"]
            target_label  = "unit"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__journal_priority_keyword"]
            target_label  = "level"
            regex         = "(.+)"
          }
        }

        loki.source.journal "host" {
          path          = "/var/log/journal"
          max_age       = "12h"
          relabel_rules = loki.relabel.journal_rules.rules
          labels = {
            job    = "systemd-journal",
            source = "journal",
          }
          forward_to = [loki.write.default.receiver]
        }

        loki.relabel "syslog_rules" {
          forward_to = []

          rule {
            source_labels = ["__syslog_message_hostname"]
            target_label  = "hostname"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__syslog_connection_ip_address"]
            target_label  = "client_ip"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__syslog_message_app_name"]
            target_label  = "app"
            regex         = "(.+)"
          }

          rule {
            source_labels = ["__syslog_message_severity"]
            target_label  = "level"
            regex         = "(.+)"
          }
        }

        loki.source.syslog "synology" {
          listener {
            address                         = "0.0.0.0:{{ .Values.syslogPorts.synologyTcp }}"
            protocol                        = "tcp"
            syslog_format                   = "rfc3164"
            idle_timeout                    = "60s"
            use_incoming_timestamp          = false
            label_structured_data           = true
            labels = {
              job    = "syslog",
              source = "syno",
            }
          }

          relabel_rules = loki.relabel.syslog_rules.rules
          forward_to    = [loki.write.default.receiver]
        }

        loki.source.syslog "unifi" {
          listener {
            address                         = "0.0.0.0:{{ .Values.syslogPorts.unifiUdp }}"
            protocol                        = "udp"
            syslog_format                   = "rfc3164"
            use_incoming_timestamp          = false
            label_structured_data           = true
            labels = {
              job    = "syslog",
              source = "unifi",
            }
          }

          relabel_rules = loki.relabel.syslog_rules.rules
          forward_to    = [loki.write.default.receiver]
        }
syslogService:
  loadBalancerIP: <secret:kv/data/monitoring/logging~syslog_ip>
  externalTrafficPolicy: Local

loki:
  deploymentMode: SingleBinary
  loki:
    storage:
      type: filesystem
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin
    commonConfig:
      replication_factor: 1
    compactor:
      retention_enabled: true
      delete_request_store: filesystem
      compaction_interval: 1h
    limits_config:
      retention_period: 90d
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      max_query_lookback: 90d
      split_queries_by_interval: 24h
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      per_stream_rate_limit: 3MB
      per_stream_rate_limit_burst: 15MB
    schemaConfig:
      configs:
      - from: "2024-01-01"
        store: tsdb
        index:
          prefix: loki_index_
          period: 24h
        object_store: filesystem # we're storing on filesystem so there's no real persistence here.
        schema: v13
    podSecurityContext:
      fsGroup: 10001
      fsGroupChangePolicy: Always  # Always fix ownership on mount, not just on mismatch
      runAsGroup: 10001
      runAsNonRoot: true
      runAsUser: 10001
  singleBinary:
    replicas: 1
    persistence:
      storageClass: longhorn
      size: 10Gi
      volumeName: monitoring-loki
    resources:
      requests:
        cpu: 150m
        memory: 512Mi
      limits:
        cpu: 750m
        memory: 1Gi
  read:
    replicas: 0
  backend:
    replicas: 0
  write:
    replicas: 0
  monitoring:
    serviceMonitor:
      enabled: true
      labels:
        release: monitoring
      interval: 30s
      metricRelabelings:
        # Drop high-cardinality gRPC message size histograms — not useful for homelab dashboards
        - sourceLabels: [__name__]
          regex: loki_(request_message_bytes|response_message_bytes)_bucket
          action: drop
        # Drop internal cache/kv/memcache latency histograms — internals not worth storing
        - sourceLabels: [__name__]
          regex: loki_(memcache_request_duration_seconds|kv_request_duration_seconds|cache_value_size_bytes|cache_request_duration_seconds)_bucket
          action: drop
        # Drop Go runtime GC/scheduler histograms — too many buckets, not actionable
        - sourceLabels: [__name__]
          regex: go_(gc_heap_(allocs|frees)_by_size_bytes|sched_(pauses|latencies)|gc_pauses).*_bucket
          action: drop
  # Reduce memcached cache sizes from defaults (8192MB/1024MB) — homelab doesn't need production sizing
  chunksCache:
    allocatedMemory: 256
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 768Mi
  resultsCache:
    allocatedMemory: 128
  # Disable synthetic canary probes — not useful for homelab, saves ~3 pods
  lokiCanary:
    enabled: false
  test:
    enabled: false
  # Reduce gateway noise
  gateway:
    verboseLogging: false

storage:
  - nameSuffix: loki
    pvcName: storage-logging-loki-0
    mountPath: /var/loki
    storagePath: loki
    volumeName: monitoring-loki
    size: "10Gi"
    type: longhorn
    accessMode: ReadWriteOnce

storageConfig:
  prefix: "monitoring"
  claimNamespace: "monitoring"
  # longhornNamespace: "storage"  # default, override if needed
