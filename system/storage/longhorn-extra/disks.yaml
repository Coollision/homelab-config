---
# Job to automatically configure Longhorn disks on labeled nodes
# Nodes must have label: longhorn.io/disk=enabled
apiVersion: batch/v1
kind: Job
metadata:
  name: longhorn-disk-configurator
  namespace: storage
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: longhorn-disk-configurator
      restartPolicy: OnFailure
      containers:
      - name: configurator
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Discovering nodes with label longhorn.io/disk=enabled..."
          
          # Get all nodes with the label
          NODES=$(kubectl get nodes -l longhorn.io/disk=enabled -o jsonpath='{.items[*].metadata.name}')
          
          if [ -z "$NODES" ]; then
            echo "No nodes found with label longhorn.io/disk=enabled"
            echo "Please label your nodes: kubectl label node <node-name> longhorn.io/disk=enabled"
            exit 1
          fi
          
          echo "Found nodes: $NODES"
          
          for NODE in $NODES; do
            echo "Configuring Longhorn disk for node: $NODE"
            
            # Check if Longhorn Node already exists
            if kubectl get node.longhorn.io "$NODE" -n storage &>/dev/null; then
              echo "Longhorn Node $NODE already exists, skipping..."
              continue
            fi
            
            # Create Longhorn Node resource
            cat <<EOF | kubectl apply -f -
          apiVersion: longhorn.io/v1beta2
          kind: Node
          metadata:
            name: $NODE
            namespace: storage
          spec:
            allowScheduling: true
            disks:
              longhorn-disk:
                path: /mnt/longhorn
                allowScheduling: true
                tags:
                  - fast
          EOF
            
            echo "Created Longhorn Node configuration for $NODE"
          done
          
          echo "Longhorn disk configuration completed!"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-disk-configurator
  namespace: storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: longhorn-disk-configurator
  namespace: storage
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
- apiGroups: ["longhorn.io"]
  resources: ["nodes"]
  verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: longhorn-disk-configurator
  namespace: storage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: longhorn-disk-configurator
subjects:
- kind: ServiceAccount
  name: longhorn-disk-configurator
  namespace: storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-disk-configurator-nodes
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-disk-configurator-nodes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-disk-configurator-nodes
subjects:
- kind: ServiceAccount
  name: longhorn-disk-configurator
  namespace: storage
