apiVersion: v1
kind: ServiceAccount
metadata:
  name: pv-reclaimer
  namespace: kube-system
  labels:
    app.kubernetes.io/name: pv-reclaimer
    app.kubernetes.io/managed-by: Helm
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave | default -5 | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pv-reclaimer
  labels:
    app.kubernetes.io/name: pv-reclaimer
    app.kubernetes.io/managed-by: Helm
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave | default -5 | quote }}
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pv-reclaimer
  labels:
    app.kubernetes.io/name: pv-reclaimer
    app.kubernetes.io/managed-by: Helm
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWave | default -5 | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pv-reclaimer
subjects:
  - kind: ServiceAccount
    name: pv-reclaimer
    namespace: kube-system
