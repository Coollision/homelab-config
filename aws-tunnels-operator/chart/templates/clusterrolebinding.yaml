{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aws-tunnels-operator.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "aws-tunnels-operator.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aws-tunnels-operator.serviceAccountName" . }}
    namespace: {{ include "aws-tunnels-operator.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aws-tunnels-operator.fullname" . }}
{{- end }}
