apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aws-tunnels-operator.fullname" . }}
  namespace: {{ include "aws-tunnels-operator.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "aws-tunnels-operator.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aws-tunnels-operator.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aws-tunnels-operator.name" . }}
    spec:
      serviceAccountName: {{ include "aws-tunnels-operator.serviceAccountName" . }}
      containers:
        - name: manager
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: STACK_CONFIGMAP_NAME
              value: {{ .Values.stackConfig.name | quote }}
            - name: ARGOCD_APP_NAME
              value: {{ .Values.argoApp.name | default .Release.Name | quote }}
            # The AWS CLI's SSO token cache lives at $HOME/.aws/sso/cache and is not relocatable by
            # env, so point HOME at a writable in-pod dir the operator seeds from / persists to the
            # captured-token Secret (see controllers/sso_token.go).
            - name: HOME
              value: /operator-home
          args:
            - --metrics-bind-address={{ .Values.operatorArgs.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.operatorArgs.healthProbeBindAddress }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: probes
              containerPort: 8081
            - name: auth
              containerPort: {{ .Values.service.authPort }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path | quote }}
              port: probes
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path | quote }}
              port: probes
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            successThreshold: {{ .Values.probes.liveness.successThreshold }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            # Writable SSO token cache. Ephemeral on purpose: the operator re-seeds it from the
            # <stack>-sso-token Secret each reconcile and persists rotations back, so durable state
            # lives in the Secret, not a PVC.
            - name: sso-cache
              mountPath: /operator-home/.aws/sso/cache
      volumes:
        - name: sso-cache
          emptyDir: {}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
