apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: awstunnelstacks.proxies.homelab.io
spec:
  group: proxies.homelab.io
  names:
    kind: AWSTunnelStack
    listKind: AWSTunnelStackList
    plural: awstunnelstacks
    singular: awstunnelstack
    shortNames:
      - awst
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [aws, tunnels]
              properties:
                aws:
                  type: object
                  required: [profile, region, ssoStartUrl, accountId, roleName]
                  properties:
                    profile: {type: string}
                    region: {type: string}
                    ssoStartUrl: {type: string}
                    accountId: {type: string}
                    roleName: {type: string}
                    extraProfiles:
                      type: array
                      items:
                        type: object
                        required: [name, region, ssoStartUrl, accountId, roleName]
                        properties:
                          name: {type: string}
                          region: {type: string}
                          ssoStartUrl: {type: string}
                          accountId: {type: string}
                          roleName: {type: string}
                auth:
                  type: object
                  properties:
                    enabled: {type: boolean}
                    name: {type: string}
                    host: {type: string}
                    image: {type: string}
                    port: {type: integer}
                nodeAffinity:
                  type: object
                  properties:
                    excludedType: {type: string}
                tunnelDefaults:
                  type: object
                  properties:
                    image: {type: string}
                    proxyImage: {type: string}
                    servicePort: {type: integer}
                tunnels:
                  type: array
                  items:
                    type: object
                    required: [name, host, bastionName, remotePort, localPort]
                    properties:
                      name: {type: string}
                      host: {type: string}
                      bastionName: {type: string}
                      remoteHost: {type: string}
                      remotePort: {type: string}
                      localPort: {type: integer}
                      awsProfile: {type: string}
                      awsRegion: {type: string}
                      ingressMode: {type: string}
                      image: {type: string}
                      proxyImage: {type: string}
                      servicePort: {type: integer}
                      rds:
                        type: object
                        properties:
                          instancePrefix: {type: string}
                          clusterPrefix: {type: string}
                      tls:
                        type: object
                        properties:
                          passthrough: {type: boolean}
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                managedTunnels:
                  type: integer
                  format: int32
      subresources:
        status: {}
