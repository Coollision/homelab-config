nameOverride: ""
fullnameOverride: aws-tunnels-operator
namespaceOverride: ""

image:
  repository: ghcr.io/coollision/aws-tunnels-operator
  tag: v0.7.24
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

service:
  create: true
  authPort: 8090

ingress:
  enabled: false
  entryPoints:
    - websecure
  tls: true

operatorArgs:
  metricsBindAddress: :8080
  healthProbeBindAddress: :8081

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  liveness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

affinity: {}
tolerations: []
nodeSelector: {}

# ArgoCD resource tracking. The operator labels and annotates all managed resources
# (Deployments, Services, Secrets, IngressRoutes) with app.kubernetes.io/instance
# and argocd.argoproj.io/tracking-id so they appear in the ArgoCD app UI.
# Defaults to the Helm release name (which equals the ArgoCD app name in most setups).
# Set explicitly to override, or to "" to disable.
argoApp:
  name: ""

stackConfig:
  name: aws-tunnels-operator-stack

# Single stack desired state consumed by the operator from ConfigMap.
stack:
  name: aws-tunnels
  aws:
    profile: awsprofile001
    region: eu-west-1
    ssoStartUrl: ""
    accountId: ""
    roleName: ""
    extraProfiles: []
    # useRefresh: render the modern sso-session config (sso_registration_scopes) so `aws sso login` mints a
    # REFRESH TOKEN and the operator silently auto-refreshes STS creds for the whole SSO session.
    # The in-cluster login also switches to the device-code flow (remote-clickable) and the token
    # cache is persisted to the <stack>-sso-token Secret. Tunnels mount the creds Secret and read
    # rotated creds in place, so they are NOT rolled (no ~hourly connection drop) when creds refresh.
    # When false (default), the legacy inline format is used, creds arrive as env vars, and a manual
    # login + pod roll is needed whenever creds expire (prior behavior).
    useRefresh: false
  auth:
    enabled: true
    host: ""
    port: 8090
  shared:
    awsConfigMapName: ""
  nodeAffinity:
    excludedType: ""
  tunnelDefaults:
    image: ghcr.io/coollision/aws-tunnel-runner:v0.7.24
    proxyImage: alpine/socat:1.8.1.3
    servicePort: 8080
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    proxyResources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
  tunnels: []
