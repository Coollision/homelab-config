nameOverride: ""
fullnameOverride: aws-tunnels-operator
namespaceOverride: ""

image:
  repository: ghcr.io/coollision/aws-tunnels-operator
  tag: v0.6.0
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

service:
  create: true
  authPort: 8090

ingress:
  enabled: false
  entryPoints:
    - websecure
  tls: true

operatorArgs:
  metricsBindAddress: :8080
  healthProbeBindAddress: :8081

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  liveness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

affinity: {}
tolerations: []
nodeSelector: {}

# Set to the ArgoCD Application name to have the operator label all managed
# resources with app.kubernetes.io/instance so they appear in the ArgoCD UI.
argoApp:
  name: ""

stackConfig:
  name: aws-tunnels-operator-stack

# Single stack desired state consumed by the operator from ConfigMap.
stack:
  name: aws-tunnels
  aws:
    profile: awsprofile001
    region: eu-west-1
    ssoStartUrl: ""
    accountId: ""
    roleName: ""
    extraProfiles: []
  auth:
    enabled: true
    host: ""
    port: 8090
  shared:
    awsConfigMapName: ""
  nodeAffinity:
    excludedType: ""
  tunnelDefaults:
    image: ghcr.io/coollision/aws-tunnel-runner:v0.6.0
    proxyImage: alpine/socat:1.8.0.3
    servicePort: 8080
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 30
      failureThreshold: 3
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    proxyResources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
  tunnels: []
