nameOverride: ""
fullnameOverride: aws-tunnels-operator
namespaceOverride: ""

image:
  repository: ghcr.io/coollision/aws-tunnels-operator
  tag: v0.1.2
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

service:
  create: true
  authPort: 8090

ingress:
  enabled: true
  entryPoints:
    - websecure
  host: aws-auth.<secret:kv/data/domains~domain>
  tls: true

operatorArgs:
  metricsBindAddress: :8080
  healthProbeBindAddress: :8081

resources: {}

affinity: {}
tolerations: []
nodeSelector: {}

stackConfig:
  name: aws-tunnels-operator-stack

# Single stack desired state consumed by the operator from ConfigMap.
stack:
  name: aws-tunnels
  aws:
    profile: awsprofile001
    region: eu-west-1
    ssoStartUrl: ""
    accountId: ""
    roleName: ""
    extraProfiles: []
  auth:
    enabled: true
    host: aws-auth.<secret:kv/data/domains~domain>
    port: 8090
  nodeAffinity:
    excludedType: ""
  tunnelDefaults:
    image: amazon/aws-cli:2.27.9
    proxyImage: alpine/socat:1.8.0.3
    servicePort: 8080
  tunnels: []
